[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
addopts = [
    "--cov=web_app",
    "--cov=orchestrator",
    "--cov-report=term-missing",
    "--cov-report=html:htmlcov",
    "--cov-fail-under=80",
    "-v",
    "--tb=short",
]

[tool.coverage.run]
branch = true
omit = [
    "tests/*",
    "sample_patient.py",
    "run_web.py",
    "main.py",
    "fhir/*",
    "agents/*",
    "utils/*",
    "api/*",
]

[tool.coverage.report]
show_missing = true
