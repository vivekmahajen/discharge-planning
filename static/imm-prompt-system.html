const SYSTEM_PROMPT = `You are a Medicare compliance specialist embedded in a HIPAA-compliant hospital discharge planning system in California. Your role is to assist discharge planners in accurately documenting the delivery of the Important Message from Medicare (IMM), tracking appeal rights, and maintaining a legally defensible audit trail that satisfies CMS Conditions of Participation (42 CFR §482.13(e)) and California CDPH requirements.

The IMM (CMS-R-193) is a federally mandated document that must be:
1. Delivered to every Medicare inpatient beneficiary (or their representative) within 2 days of admission
2. Re-delivered no more than 2 days before discharge
3. Signed by the patient or authorized representative at each delivery
4. Re-delivery triggered any time a new discharge date is set

Livanta is the Beneficiary and Family Centered Care Quality Improvement Organization (BFCC-QIO) for California. When a patient exercises their right to appeal, Livanta must be notified BEFORE the discharge occurs. The hospital may not discharge until Livanta issues its determination unless the patient withdraws their appeal.

You operate under these non-negotiable constraints:
- NEVER record a delivery that did not occur — you log what the planner reports, and flag inconsistencies
- NEVER create, edit, or delete a completed IMM log entry — all records are append-only after attestation
- ALWAYS compute deadline timestamps server-side from the provided delivery timestamp — never trust user-entered deadlines
- ALWAYS surface the Livanta phone number (1-888-524-9900) and fax (1-888-985-8775) when appeal rights are invoked
- ALWAYS flag when re-delivery is overdue (within 2 days of planned discharge date)
- Output must be structured JSON — no prose, no markdown fences, no preamble`;

const INTEGRATION_CODE = `// api/imm/log.js — IMM delivery logging endpoint
// Handles: create, re-delivery check, appeal filing

import { createClient } from '@supabase/supabase-js';

const supabase = createClient(
  process.env.SUPABASE_URL,
  process.env.SUPABASE_SERVICE_KEY // server-side only — never expose to client
);

export async function POST(req) {
  const { action, payload, staffId } = await req.json();

  switch (action) {

    // ── Log a new IMM delivery event ──────────────────────────────────────
    case 'log_delivery': {
      const userPrompt = buildDeliveryPrompt(payload);

      const ai = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 3000,
          temperature: 0,
          system: SYSTEM_PROMPT,
          messages: [{ role: 'user', content: userPrompt }]
        })
      });

      const aiData = await ai.json();
      const raw = aiData.content[0].text
        .replace(/^\`\`\`json\\n?/, '').replace(/\\n?\`\`\`$/, '').trim();
      const result = JSON.parse(raw);

      const { data: logEntry, error } = await supabase
        .from('imm_delivery_logs')
        .insert({
          encounter_id:         payload.encounterId,
          patient_id:           payload.patientId,
          event_type:           result.log_entry.event_type,
          delivery_timestamp:   result.log_entry.delivery_timestamp,
          delivered_by_name:    result.log_entry.delivered_by_name,
          delivered_by_id:      staffId,
          delivery_method:      result.log_entry.delivery_method,
          signed_by:            result.log_entry.signed_by,
          representative_name:  result.log_entry.representative_name,
          interpreter_used:     result.log_entry.interpreter_used,
          interpreter_language: result.log_entry.interpreter_language,
          interpreter_type:     result.log_entry.interpreter_type,
          patient_understanding: result.log_entry.patient_verbalized_understanding,
          patient_concerns:     result.log_entry.patient_concerns,
          compliance_status:    result.compliance_status,
          appeal_record:        result.appeal_record,
          alerts:               result.alerts,
          audit_trail:          result.audit_trail,
          immutable:            true,
          attestation_pending:  true,
          created_at:           new Date().toISOString(),
        })
        .select()
        .single();

      if (error) throw error;

      await supabase.from('audit_log').insert({
        action:       'IMM_LOG_CREATED',
        table_name:   'imm_delivery_logs',
        record_id:    logEntry.id,
        performed_by: staffId,
        timestamp:    new Date().toISOString(),
        summary:      \`IMM \${result.log_entry.event_type} logged for encounter \${payload.encounterId}\`
      });

      const criticalAlerts = result.alerts.filter(a => a.severity === 'critical');
      if (criticalAlerts.length > 0) {
        await supabase.from('planner_alerts').insert(
          criticalAlerts.map(a => ({
            encounter_id: payload.encounterId,
            alert_type:   a.category,
            severity:     a.severity,
            message:      a.message,
            action:       a.action_required,
            deadline:     a.deadline,
            resolved:     false,
            created_at:   new Date().toISOString()
          }))
        );
      }

      return Response.json({ success: true, logEntry, result });
    }

    case 'check_redelivery': {
      const { data: encounters } = await supabase
        .from('encounters')
        .select(\`
          id, admission_date, planned_discharge_date,
          imm_delivery_logs(event_type, delivery_timestamp, created_at)
        \`)
        .eq('status', 'active')
        .eq('imm_required', true);

      const overdue = [];
      const dueSoon = [];

      for (const enc of encounters) {
        const logs     = enc.imm_delivery_logs || [];
        const initial  = logs.find(l => l.event_type === 'initial_delivery');
        const reDel    = logs.find(l => l.event_type === 're_delivery');
        const discharge = new Date(enc.planned_discharge_date);
        const deadline  = new Date(discharge.getTime() - 2 * 24 * 60 * 60 * 1000);
        const now       = new Date();
        const hoursLeft = (deadline - now) / 3600000;

        if (initial && !reDel) {
          if (now > deadline)       overdue.push({ ...enc, hoursLeft });
          else if (hoursLeft <= 24) dueSoon.push({ ...enc, hoursLeft });
        }
      }

      return Response.json({ overdue, dueSoon });
    }

    case 'attest': {
      const { logId } = payload;

      const { data: log } = await supabase
        .from('imm_delivery_logs')
        .select('delivered_by_id, attestation_pending')
        .eq('id', logId)
        .single();

      if (log.delivered_by_id !== staffId)
        return Response.json({ error: 'Only the original logger may attest' }, { status: 403 });
      if (!log.attestation_pending)
        return Response.json({ error: 'Record already attested' }, { status: 400 });

      await supabase
        .from('imm_delivery_logs')
        .update({ attestation_pending: false, attested_at: new Date().toISOString(), attested_by: staffId })
        .eq('id', logId);

      await supabase.from('audit_log').insert({
        action: 'IMM_LOG_ATTESTED', table_name: 'imm_delivery_logs',
        record_id: logId, performed_by: staffId,
        timestamp: new Date().toISOString(), summary: 'IMM log entry attested and locked'
      });

      return Response.json({ success: true, locked: true });
    }

    default:
      return Response.json({ error: 'Unknown action' }, { status: 400 });
  }
}`;

const DB_SCHEMA = `-- IMM delivery log (append-only, immutable after attestation)
CREATE TABLE imm_delivery_logs (
  id                    uuid PRIMARY KEY DEFAULT gen_random_uuid(),
  encounter_id          uuid NOT NULL REFERENCES encounters(id),
  patient_id            uuid NOT NULL REFERENCES patients(id),

  event_type            text NOT NULL CHECK (event_type IN (
                          'initial_delivery','re_delivery','appeal_filed',
                          'appeal_withdrawn','appeal_determination','re_delivery_overdue_flag')),
  delivery_timestamp    timestamptz NOT NULL,
  delivered_by_name     text NOT NULL,
  delivered_by_id       uuid NOT NULL REFERENCES staff(id),
  delivery_method       text NOT NULL CHECK (delivery_method IN (
                          'in_person','via_representative',
                          'via_interpreter','telephone_only')),
  signed_by             text NOT NULL CHECK (signed_by IN (
                          'patient','authorized_representative',
                          'patient_declined','patient_incapacitated')),
  representative_name        text,
  representative_relationship text,

  interpreter_used      boolean NOT NULL DEFAULT false,
  interpreter_language  text,
  interpreter_type      text CHECK (interpreter_type IN (
                          'professional_in_person','professional_telephone',
                          'staff','family_member')),

  patient_understanding text CHECK (patient_understanding IN (
                          'true','false','unable_to_assess')),
  patient_concerns      text,

  compliance_status     jsonb,
  appeal_record         jsonb,
  alerts                jsonb,
  audit_trail           jsonb,

  immutable             boolean NOT NULL DEFAULT true,
  attestation_pending   boolean NOT NULL DEFAULT true,
  attested_at           timestamptz,
  attested_by           uuid REFERENCES staff(id),
  created_at            timestamptz NOT NULL DEFAULT now(),

  CONSTRAINT no_edit_after_attestation CHECK (
    attestation_pending = true OR attested_at IS NOT NULL
  )
);

CREATE TABLE audit_log (
  id           uuid PRIMARY KEY DEFAULT gen_random_uuid(),
  action       text NOT NULL,
  table_name   text,
  record_id    uuid,
  performed_by uuid REFERENCES staff(id),
  timestamp    timestamptz NOT NULL DEFAULT now(),
  summary      text
);

CREATE TABLE planner_alerts (
  id           uuid PRIMARY KEY DEFAULT gen_random_uuid(),
  encounter_id uuid NOT NULL REFERENCES encounters(id),
  log_id       uuid REFERENCES imm_delivery_logs(id),
  alert_type   text NOT NULL,
  severity     text NOT NULL CHECK (severity IN ('critical','warning','info')),
  message      text NOT NULL,
  action       text,
  deadline     timestamptz,
  resolved     boolean NOT NULL DEFAULT false,
  resolved_by  uuid REFERENCES staff(id),
  resolved_at  timestamptz,
  created_at   timestamptz NOT NULL DEFAULT now()
);

-- Row-Level Security: lock records after attestation
ALTER TABLE imm_delivery_logs ENABLE ROW LEVEL SECURITY;

CREATE POLICY imm_immutable_after_attest ON imm_delivery_logs
  FOR UPDATE USING (attestation_pending = true);

CREATE INDEX idx_imm_encounter ON imm_delivery_logs(encounter_id, event_type);
CREATE INDEX idx_imm_alerts    ON planner_alerts(encounter_id, severity, resolved);`;

      "Sacramento County priority languages: Spanish, Vietnamese, Hmong, Russian, Tagalog, Cantonese/Mandarin",
    ],
  },
  {
    title: "Appeal & Livanta (BFCC-QIO) rules",
    color: "#5F3F8A", bg: "#EEEDFE",
    items: [
      "Patient has until midnight of the day after re-delivery to file an appeal — the 24-hour window starts at re-delivery timestamp",
      "Livanta (1-888-524-9900) must be called BEFORE the patient is discharged once an appeal is filed",
      "Once appeal is filed, a discharge hold is active — hospital CANNOT discharge until Livanta issues determination",
      "Livanta has until midnight of the day following the appeal to issue a determination for standard reviews",
      "If Livanta upholds the discharge and patient stays anyway, issue a Hospital-Issued Notice of Non-coverage (HINN) — patient becomes liable for continued stay costs the next day",
      "If Livanta overturns the discharge, document the determination and update the discharge plan immediately",
    ],
  },
  {
    title: "Audit trail & immutability",
    color: "#6B4A10", bg: "#FAEEDA",
    items: [
      "IMM log entries must be append-only — no edits or deletions after attestation under any circumstances",
      "Use Postgres Row-Level Security to enforce immutability at the database level, not just application logic",
      "Every log entry requires a staff ID, not just a name — names can be duplicated, IDs cannot",
      "Audit log entries (separate table) must record who created, attested, and viewed sensitive records",
      "In a Livanta audit or litigation, your audit trail is your primary defense — treat it as evidence from day one",
      "Never store patient's full Medicare Beneficiary Identifier (MBI) in logs — last 4 digits only for reference",
    ],
  },
];

const tabs = [
  { id: "system",      label: "System prompt" },
  { id: "delivery",    label: "Delivery log prompt" },
  { id: "redelivery",  label: "Re-delivery check" },
  { id: "appeal",      label: "Appeal workflow" },
  { id: "integration", label: "API + DB schema" },
  { id: "rules",       label: "Compliance rules" },
];

const CONTENT = {
  system:      SYSTEM_PROMPT,
  delivery:    USER_PROMPT_TEMPLATE,
  redelivery:  REDELIVERY_PROMPT,
  appeal:      APPEAL_PROMPT,
  integration: INTEGRATION_CODE,
};

const headerMeta = {
  system:      { title: "System prompt", sub: "Role, constraints, and CMS/CDPH rules. Sent with every API call — never modify between requests." },
  delivery:    { title: "Delivery log prompt", sub: "20 template variables covering delivery, appeal, interpreter, and prior history. Returns full compliance status + alerts." },
  redelivery:  { title: "Re-delivery check prompt", sub: "Lightweight scheduled check. Run as a cron job every 6 hours against all active Medicare encounters." },
  appeal:      { title: "Appeal workflow prompt", sub: "Triggered when a patient files or considers filing an appeal. Generates Livanta action checklist and discharge hold status." },
  integration: { title: "Next.js API route / Postgres schema", sub: "Three actions: log_delivery, check_redelivery, attest. Includes audit trail and alert surfacing." },
  rules:       { title: "Compliance rules reference", sub: "CMS §482.13(e), California Title 22, Livanta BFCC-QIO procedures, and audit trail requirements." },
};

function IMMPromptSystem() {
  const [activeTab, setActiveTab] = useState("system");
  const [copied, setCopied] = useState(null);
  const [dbView, setDbView] = useState("api");

  const copy = (text, id) => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(id);
      setTimeout(() => setCopied(null), 2000);
    });
  };

  const getContent = () => {
    if (activeTab === "integration") return dbView === "api" ? INTEGRATION_CODE : DB_SCHEMA;
    return CONTENT[activeTab] || "";
  };

  const getFilename = () => {
    if (activeTab === "system")      return "imm_system_prompt.txt";
    if (activeTab === "delivery")    return "imm_delivery_log_prompt.txt";
    if (activeTab === "redelivery")  return "imm_redelivery_check_prompt.txt";
    if (activeTab === "appeal")      return "imm_appeal_workflow_prompt.txt";
    if (activeTab === "integration" && dbView === "api") return "api/imm/log.js";
    if (activeTab === "integration" && dbView === "db")  return "schema/imm_tables.sql";
    return "";
  };

  return (
    <div style={{ fontFamily: "'Charter','Georgia',serif", background: "#F8F6F2", minHeight: "100vh", color: "#1C1B19" }}>

      {/* Module header */}
      <div style={{ background: "#1C1B19", padding: "26px 30px 22px", borderBottom: "3px solid #378ADD" }}>
        <div style={{ fontSize: 10, letterSpacing: "0.2em", color: "#666", textTransform: "uppercase", marginBottom: 8 }}>
          Discharge Planning AI · IMM Compliance Module
        </div>
        <h1 style={{ fontFamily: "'Charter','Georgia',serif", fontSize: 22, fontWeight: 700, color: "#F2F0EC", margin: "0 0 5px" }}>
          IMM Delivery Logging · Prompt System
        </h1>
        <p style={{ fontSize: 12, color: "#888", margin: 0, lineHeight: 1.5 }}>
          CMS §482.13(e) · California CDPH · Livanta BFCC-QIO · Append-only audit trail · HIPAA-compliant
        </p>
        <div style={{ display: "flex", gap: 8, marginTop: 14, flexWrap: "wrap" }}>
          {[
            { label: "2 days",   sub: "Initial delivery window" },
            { label: "2 days",   sub: "Re-delivery before DC" },
            { label: "24 hrs",   sub: "Patient appeal window" },
            { label: "Livanta",  sub: "1-888-524-9900" },
          ].map((s, i) => (
            <div key={i} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, padding: "6px 12px", display: "flex", gap: 6, alignItems: "baseline" }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: "#378ADD" }}>{s.label}</span>
              <span style={{ fontSize: 10, color: "#666" }}>{s.sub}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ background: "#111", display: "flex", overflowX: "auto", borderBottom: "1px solid #252522" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
            background: activeTab === t.id ? "#1C1B19" : "transparent",
            border: "none", borderBottom: activeTab === t.id ? "2px solid #378ADD" : "2px solid transparent",
            color: activeTab === t.id ? "#F2F0EC" : "#555",
            padding: "10px 18px", fontSize: 12, cursor: "pointer", fontFamily: "inherit",
            whiteSpace: "nowrap", letterSpacing: "0.02em", transition: "all .15s",
          }}>{t.label}</button>
        ))}
      </div>

      <div style={{ padding: "22px 28px", maxWidth: 900 }}>

        {activeTab !== "rules" && (
          <div>
            {activeTab === "integration" && (
              <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                {[["api","API route"],["db","DB schema"]].map(([v, label]) => (
                  <button key={v} onClick={() => setDbView(v)} style={{
                    background: dbView === v ? "#378ADD" : "transparent",
                    color: dbView === v ? "#fff" : "#888",
                    border: "1px solid " + (dbView === v ? "#378ADD" : "#333"),
                    padding: "4px 14px", borderRadius: 4, fontSize: 11,
                    cursor: "pointer", fontFamily: "inherit",
                  }}>{label}</button>
                ))}
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#1C1B19", marginBottom: 3 }}>
                  {headerMeta[activeTab]?.title}
                </div>
                <div style={{ fontSize: 12, color: "#777", lineHeight: 1.5, maxWidth: 560 }}>
                  {headerMeta[activeTab]?.sub}
                </div>
              </div>
              <button onClick={() => copy(getContent(), activeTab)} style={{
                background: copied === activeTab ? "#1D9E75" : "#378ADD",
                color: "#fff", border: "none", padding: "7px 16px", borderRadius: 4,
                fontSize: 11, cursor: "pointer", fontFamily: "inherit",
                flexShrink: 0, marginLeft: 12, transition: "background .2s",
              }}>
                {copied === activeTab ? "✓ Copied" : "Copy"}
              </button>
            </div>

            {activeTab === "delivery" && (
              <div style={{ background: "#E6F1FB", border: "1px solid #B5D4F4", borderRadius: 6, padding: "9px 13px", marginBottom: 12, fontSize: 12, color: "#0C447C", lineHeight: 1.6 }}>
                <strong>20 template variables</strong> — replace all <code style={{ background: "rgba(0,0,0,0.07)", padding: "1px 5px", borderRadius: 3, fontSize: 10 }}>{"{{VARIABLE}}"}</code> tokens server-side before the API call. Pass prior IMM history as a JSON array to enable re-delivery gap detection.
              </div>
            )}
            {activeTab === "redelivery" && (
              <div style={{ background: "#FAEEDA", border: "1px solid #FAC775", borderRadius: 6, padding: "9px 13px", marginBottom: 12, fontSize: 12, color: "#6B4A10", lineHeight: 1.6 }}>
                <strong>Run as a cron job</strong> every 6 hours against all active Medicare encounters. Surface <code style={{ background: "rgba(0,0,0,0.07)", padding: "1px 5px", borderRadius: 3, fontSize: 10 }}>overdue</code> alerts immediately in the planner dashboard. At 24 hours before the deadline, escalate to the charge nurse.
              </div>
            )}
            {activeTab === "appeal" && (
              <div style={{ background: "#FAECE7", border: "1px solid #F5C4B3", borderRadius: 6, padding: "9px 13px", marginBottom: 12, fontSize: 12, color: "#C04028", lineHeight: 1.6 }}>
                <strong>Critical:</strong> Discharge hold is active the moment an appeal is filed. Livanta (<strong>1-888-524-9900</strong>) must be called before any discharge action. This prompt surfaces every required step and responsible party.
              </div>
            )}
            {activeTab === "integration" && dbView === "db" && (
              <div style={{ background: "#E1F5EE", border: "1px solid #9FE1CB", borderRadius: 6, padding: "9px 13px", marginBottom: 12, fontSize: 12, color: "#0F6E56", lineHeight: 1.6 }}>
                <strong>Immutability enforced at DB level</strong> via Postgres Row-Level Security — not just application logic. The RLS policy prevents any UPDATE to attested records even if application code is compromised. Sign a BAA with Supabase before storing real PHI.
              </div>
            )}

            <div style={{ background: "#111", borderRadius: 8, border: "1px solid #252522", overflow: "hidden" }}>
              <div style={{ background: "#1C1B19", padding: "8px 14px", display: "flex", gap: 6, alignItems: "center", borderBottom: "1px solid #252522" }}>
                <span style={{ width: 9, height: 9, borderRadius: "50%", background: "#C04028" }}></span>
                <span style={{ width: 9, height: 9, borderRadius: "50%", background: "#BA7517" }}></span>
                <span style={{ width: 9, height: 9, borderRadius: "50%", background: "#1D9E75" }}></span>
                <span style={{ fontSize: 10, color: "#444", marginLeft: 8 }}>{getFilename()}</span>
              </div>
              <pre style={{
                margin: 0, padding: "18px 20px",
                color: "#B8B4AC", fontFamily: "'Menlo','Monaco','Courier New',monospace",
                fontSize: 11, lineHeight: 1.75, overflow: "auto", maxHeight: 500,
                whiteSpace: "pre-wrap", wordBreak: "break-word",
              }}>{getContent()}</pre>
            </div>

            <div style={{ marginTop: 8, display: "flex", gap: 14, flexWrap: "wrap" }}>
              {activeTab === "system"     && <><span style={{ fontSize: 11, color: "#999" }}>~{Math.round(SYSTEM_PROMPT.length / 4)} tokens</span><span style={{ fontSize: 11, color: "#999" }}>temperature: 0 · Sent with every call</span></>}
              {activeTab === "delivery"   && <><span style={{ fontSize: 11, color: "#999" }}>~{Math.round(USER_PROMPT_TEMPLATE.length / 4)} tokens base</span><span style={{ fontSize: 11, color: "#999" }}>max_tokens: 3000 · temperature: 0</span></>}
              {activeTab === "redelivery" && <><span style={{ fontSize: 11, color: "#999" }}>Lightweight check · max_tokens: 500</span><span style={{ fontSize: 11, color: "#999" }}>Run every 6 hours via cron</span></>}
              {activeTab === "appeal"     && <><span style={{ fontSize: 11, color: "#999" }}>Triggered on appeal event · max_tokens: 2000</span><span style={{ fontSize: 11, color: "#999" }}>temperature: 0</span></>}
            </div>
          </div>
        )}

        {activeTab === "rules" && (
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#1C1B19", marginBottom: 4 }}>Compliance rules reference</div>
            <div style={{ fontSize: 12, color: "#888", marginBottom: 20 }}>Apply when building, extending, or auditing the IMM logging feature.</div>

            <div style={{ background: "#1C1B19", borderRadius: 8, padding: "14px 18px", marginBottom: 20, display: "flex", gap: 24, flexWrap: "wrap" }}>
              <div>
                <div style={{ fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: "#555", marginBottom: 5 }}>Livanta BFCC-QIO · California</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: "#378ADD" }}>1-888-524-9900</div>
                <div style={{ fontSize: 11, color: "#666", marginTop: 2 }}>24/7 · Urgent appeals</div>
              </div>
              <div>
                <div style={{ fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: "#555", marginBottom: 5 }}>Fax</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#F2F0EC" }}>1-888-985-8775</div>
              </div>
              <div>
                <div style={{ fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: "#555", marginBottom: 5 }}>Website</div>
                <div style={{ fontSize: 12, color: "#378ADD" }}>livantaqio.org</div>
              </div>
              <div>
                <div style={{ fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: "#555", marginBottom: 5 }}>IMM Form</div>
                <div style={{ fontSize: 12, color: "#F2F0EC" }}>CMS-R-193</div>
              </div>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              {RULES.map((section, i) => (
                <div key={i} style={{ background: "#fff", border: "1px solid #E5E2DC", borderRadius: 8, overflow: "hidden" }}>
                  <div style={{ background: section.bg, padding: "10px 16px", borderBottom: `1px solid ${section.color}22` }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: section.color, letterSpacing: "0.05em", textTransform: "uppercase" }}>{section.title}</div>
                  </div>
                  <div style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 8 }}>
                    {section.items.map((item, j) => (
                      <div key={j} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                        <span style={{ width: 18, height: 18, borderRadius: "50%", background: section.bg, color: section.color, fontSize: 9, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 2 }}>{j + 1}</span>
                        <span style={{ fontSize: 12, color: "#444", lineHeight: 1.6 }}>{item}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <div style={{ borderTop: "1px solid #E5E2DC", padding: "14px 28px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <span style={{ fontSize: 11, color: "#aaa" }}>CMS §482.13(e) · California Title 22 · Livanta BFCC-QIO · HIPAA-compliant</span>
        <div style={{ display: "flex", gap: 6 }}>
          {[["system","System"],["delivery","Delivery"],["appeal","Appeal"],["integration","API"]].map(([id, label]) => (
            <button key={id} onClick={() => copy(CONTENT[id] || INTEGRATION_CODE, `f-${id}`)} style={{
              background: copied === `f-${id}` ? "#1D9E75" : "transparent",
              color: copied === `f-${id}` ? "#fff" : "#999",
              border: "1px solid #ddd", padding: "4px 10px", borderRadius: 4,
              fontSize: 10, cursor: "pointer", fontFamily: "inherit",
              textTransform: "uppercase", letterSpacing: "0.05em", transition: "all .2s"
            }}>{copied === `f-${id}` ? "✓" : label}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<IMMPromptSystem />);
</script>
  <script src="/static/pwa.js" defer></script>
</body>
</html>
