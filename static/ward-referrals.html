<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" />
<meta name="theme-color" content="#00529B" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="DischargePlan" />
<link rel="stylesheet" href="/static/mobile.css" />
<title>Referrals — Discharge Planning AI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f8; color: #1e293b; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a56db, #1e3a8a);
    color: #fff; padding: 0 24px; min-height: 56px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .logo { font-size: 1.4rem; }
  header h1 { font-size: 1rem; font-weight: 700; }
  header p { font-size: 0.72rem; opacity: 0.75; }
  .spacer { flex: 1; }
  header a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.82rem; padding: 6px 10px; border-radius: 6px; transition: background 0.15s; }
  header a:hover { background: rgba(255,255,255,0.15); }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

  .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .page-header h2 { font-size: 1.5rem; font-weight: 700; flex: 1; }

  .summary-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px 20px; }
  .stat-card .label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin-bottom: 6px; }
  .stat-card .value { font-size: 1.6rem; font-weight: 800; }
  .stat-card.blue .value { color: #1a56db; }
  .stat-card.green .value { color: #16a34a; }
  .stat-card.amber .value { color: #d97706; }
  .stat-card.red .value { color: #dc2626; }

  .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-select { padding: 7px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.85rem; background: #fff; }
  .filter-select:focus { outline: none; border-color: #1a56db; }

  .referral-row {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 18px;
    margin-bottom: 8px; display: flex; align-items: flex-start; gap: 14px;
  }
  .referral-row:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .ref-status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .dot-draft { background: #94a3b8; }
  .dot-sent { background: #3b82f6; }
  .dot-pending_review { background: #f59e0b; }
  .dot-accepted { background: #16a34a; }
  .dot-declined { background: #ef4444; }
  .dot-cancelled { background: #94a3b8; }

  .ref-info { flex: 1; min-width: 0; }
  .ref-title-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .ref-facility { font-weight: 600; font-size: 0.9rem; }
  .ref-patient { font-size: 0.8rem; color: #1a56db; text-decoration: none; }
  .ref-patient:hover { text-decoration: underline; }
  .ref-meta { font-size: 0.75rem; color: #94a3b8; display: flex; gap: 10px; flex-wrap: wrap; margin-top: 3px; }
  .status-badge {
    display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 999px;
  }
  .badge-draft { background: #f1f5f9; color: #64748b; }
  .badge-sent { background: #dbeafe; color: #1d4ed8; }
  .badge-pending_review { background: #fef3c7; color: #92400e; }
  .badge-accepted { background: #dcfce7; color: #166534; }
  .badge-declined { background: #fee2e2; color: #991b1b; }
  .badge-cancelled { background: #f1f5f9; color: #64748b; }

  .urgency-badge { display: inline-block; font-size: 0.65rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
  .urg-stat { background: #fee2e2; color: #991b1b; }
  .urg-urgent { background: #fef3c7; color: #92400e; }
  .urg-routine { background: #f0f9ff; color: #075985; }

  .channel-chip { font-size: 0.7rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 4px; padding: 1px 6px; color: #475569; }

  .ref-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .btn-action {
    padding: 5px 11px; border-radius: 5px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 1px solid;
    transition: background 0.15s;
  }
  .btn-view { background: #f8fafc; border-color: #cbd5e1; color: #475569; }
  .btn-view:hover { background: #e2e8f0; }
  .btn-resend { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
  .btn-resend:hover { background: #dbeafe; }

  .empty { text-align: center; color: #94a3b8; padding: 60px 20px; font-size: 0.95rem; }
  .loading { text-align: center; color: #94a3b8; padding: 40px; }

  /* Referral detail modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 1000; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; width: 100%; max-width: 700px; max-height: 90vh;
    overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid #e2e8f0;
    display: flex; align-items: center; gap: 12px;
  }
  .modal-header h3 { font-size: 1rem; font-weight: 700; flex: 1; }
  .modal-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #94a3b8; padding: 4px; }
  .modal-close:hover { color: #1e293b; }
  .modal-body { padding: 20px 24px; }
  .modal-section { margin-bottom: 20px; }
  .modal-section h4 { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; margin-bottom: 10px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .detail-item .di-label { font-size: 0.72rem; color: #94a3b8; font-weight: 600; }
  .detail-item .di-val { font-size: 0.88rem; color: #1e293b; margin-top: 1px; }

  .delivery-log { }
  .log-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.82rem; }
  .log-row:last-child { border-bottom: none; }
  .log-icon { width: 20px; text-align: center; }
  .log-detail { flex: 1; }
  .log-time { color: #94a3b8; font-size: 0.75rem; }

  .messages-section { margin-top: 16px; }
  .msg-row { padding: 10px 12px; background: #f8fafc; border-radius: 8px; margin-bottom: 8px; }
  .msg-author { font-size: 0.75rem; font-weight: 600; color: #475569; }
  .msg-text { font-size: 0.85rem; color: #1e293b; margin-top: 3px; }
  .msg-time { font-size: 0.72rem; color: #94a3b8; }

  .add-msg-form { display: flex; gap: 8px; margin-top: 12px; }
  .add-msg-form textarea { flex: 1; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 10px; font-size: 0.85rem; font-family: inherit; resize: none; }
  .add-msg-form textarea:focus { outline: none; border-color: #1a56db; }
  .btn-msg { background: #1a56db; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 0.82rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .btn-msg:hover { background: #1646b8; }

  .status-update-form { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .status-update-form select { padding: 7px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.85rem; }
  .btn-update-status { padding: 7px 14px; background: #1a56db; color: #fff; border: none; border-radius: 6px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }

  .analytics-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .analytics-card h3 { font-size: 0.85rem; font-weight: 700; color: #475569; margin-bottom: 12px; }
  .bar-chart { display: flex; flex-direction: column; gap: 6px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 0.75rem; color: #64748b; width: 100px; flex-shrink: 0; }
  .bar-track { flex: 1; background: #f1f5f9; border-radius: 4px; height: 14px; }
  .bar-fill { height: 14px; border-radius: 4px; background: #1a56db; transition: width 0.4s; }
  .bar-count { font-size: 0.75rem; color: #64748b; width: 24px; text-align: right; }
</style>
</head>
<body>

<header>
  <div class="logo">🏥</div>
  <div>
    <h1>Discharge Planning AI</h1>
    <p>Referral Management</p>
  </div>
  <div class="spacer"></div>
  <a href="/my-patients">My Patients</a>
  <a href="/ward-barriers">Barriers</a>
  <a href="/post-acute-directory">Directory</a>
  <a href="/ward-referrals" style="font-weight:700;">Referrals</a>
  <a href="/roi-measured">ROI</a>
  <a href="/settings">Settings</a>
  <a href="/">← Planner</a>
</header>

<div class="container">
  <div class="page-header">
    <h2>Post-Acute Referrals</h2>
    <a href="/post-acute-directory" style="padding:9px 18px;background:#1a56db;color:#fff;border-radius:7px;font-size:0.85rem;font-weight:600;text-decoration:none;">+ New Referral</a>
    <button onclick="loadAnalytics()" style="padding:9px 18px;background:#f1f5f9;color:#475569;border:1px solid #cbd5e1;border-radius:7px;font-size:0.85rem;font-weight:600;cursor:pointer;">📊 Analytics</button>
  </div>

  <div class="summary-row" id="summary-row">
    <div class="stat-card blue"><div class="label">Total Referrals</div><div class="value" id="stat-total">—</div></div>
    <div class="stat-card green"><div class="label">Accepted</div><div class="value" id="stat-accepted">—</div></div>
    <div class="stat-card amber"><div class="label">Pending</div><div class="value" id="stat-pending">—</div></div>
    <div class="stat-card blue"><div class="label">Sent (awaiting)</div><div class="value" id="stat-sent">—</div></div>
  </div>

  <div id="analytics-section" style="display:none">
    <div class="analytics-card" id="analytics-by-status">
      <h3>By Status</h3>
      <div class="bar-chart" id="bar-status"></div>
    </div>
    <div class="analytics-card" id="analytics-by-channel">
      <h3>By Delivery Channel</h3>
      <div class="bar-chart" id="bar-channel"></div>
    </div>
  </div>

  <div class="filters">
    <select class="filter-select" id="filterStatus" onchange="loadReferrals()">
      <option value="">All Statuses</option>
      <option value="draft">Draft</option>
      <option value="sent">Sent</option>
      <option value="pending_review">Pending Review</option>
      <option value="accepted">Accepted</option>
      <option value="declined">Declined</option>
      <option value="cancelled">Cancelled</option>
    </select>
    <select class="filter-select" id="filterDays" onchange="loadReferrals()">
      <option value="30">Last 30 days</option>
      <option value="60">Last 60 days</option>
      <option value="90" selected>Last 90 days</option>
      <option value="">All time</option>
    </select>
  </div>

  <div id="referral-list"><div class="loading">Loading referrals…</div></div>
</div>

<!-- Referral detail modal -->
<div class="modal-overlay" id="detail-modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Referral Details</h3>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body">Loading…</div>
  </div>
</div>

<script>
let referrals = [];
let currentRef = null;

async function loadReferrals() {
  const status = document.getElementById('filterStatus').value;
  const qs = status ? `?status=${encodeURIComponent(status)}` : '';
  try {
    const r = await fetch(`/api/referrals${qs}`);
    if (!r.ok) { showError('Failed to load referrals.'); return; }
    const data = await r.json();
    referrals = data.referrals || [];
    renderReferrals(referrals);
    updateStats(referrals);
  } catch (e) {
    showError('Network error loading referrals.');
  }
}

function updateStats(refs) {
  document.getElementById('stat-total').textContent = refs.length;
  document.getElementById('stat-accepted').textContent = refs.filter(r => r.status === 'accepted').length;
  document.getElementById('stat-pending').textContent = refs.filter(r => r.status === 'pending_review').length;
  document.getElementById('stat-sent').textContent = refs.filter(r => r.status === 'sent').length;
}

function renderReferrals(refs) {
  const el = document.getElementById('referral-list');
  if (!refs.length) {
    el.innerHTML = '<div class="empty">No referrals found. Use the Post-Acute Directory to send your first referral.</div>';
    return;
  }
  el.innerHTML = refs.map(r => `
    <div class="referral-row">
      <div class="ref-status-dot dot-${escHtml(r.status || 'draft')}"></div>
      <div class="ref-info">
        <div class="ref-title-row">
          <span class="ref-facility">${escHtml(r.facility_name || 'Unknown Facility')}</span>
          <span class="status-badge badge-${escHtml(r.status || 'draft')}">${formatStatus(r.status)}</span>
          ${r.urgency && r.urgency !== 'routine' ? `<span class="urgency-badge urg-${escHtml(r.urgency)}">${escHtml(r.urgency.toUpperCase())}</span>` : ''}
          ${r.delivery_channel ? `<span class="channel-chip">${formatChannel(r.delivery_channel)}</span>` : ''}
        </div>
        <div class="ref-meta">
          <span>Patient ID: ${escHtml(String(r.patient_id))}</span>
          ${r.service_type ? `<span>${escHtml(r.service_type)}</span>` : ''}
          <span>${formatDate(r.created_at)}</span>
          ${r.sent_at ? `<span>Sent ${formatDate(r.sent_at)}</span>` : ''}
          ${r.accepted_at ? `<span>Accepted ${formatDate(r.accepted_at)}</span>` : ''}
        </div>
      </div>
      <div class="ref-actions">
        <button class="btn-action btn-view" onclick="openDetail(${r.id})">View</button>
        ${r.status === 'sent' || r.status === 'pending_review' ? `<button class="btn-action btn-resend" onclick="resendReferral(${r.id})">Resend</button>` : ''}
      </div>
    </div>
  `).join('');
}

async function openDetail(id) {
  currentRef = referrals.find(r => r.id === id) || null;
  document.getElementById('modal-title').textContent = `Referral to ${currentRef?.facility_name || '—'}`;
  document.getElementById('modal-body').innerHTML = '<div class="loading">Loading details…</div>';
  document.getElementById('detail-modal').classList.add('open');

  try {
    const [refResp, logResp, msgResp] = await Promise.all([
      fetch(`/api/referrals/${id}`),
      fetch(`/api/referrals/${id}/delivery-log`),
      fetch(`/api/referrals/${id}/messages`),
    ]);
    const ref = await refResp.json();
    const log = await logResp.json();
    const msgs = await msgResp.json();
    renderModalBody(ref, log.log || [], msgs.messages || []);
  } catch (e) {
    document.getElementById('modal-body').innerHTML = '<p style="color:#dc2626;">Error loading details.</p>';
  }
}

function renderModalBody(ref, log, msgs) {
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <h4>Referral Info</h4>
      <div class="detail-grid">
        <div class="detail-item"><div class="di-label">Facility</div><div class="di-val">${escHtml(ref.facility_name || '—')}</div></div>
        <div class="detail-item"><div class="di-label">Status</div><div class="di-val"><span class="status-badge badge-${escHtml(ref.status || 'draft')}">${formatStatus(ref.status)}</span></div></div>
        <div class="detail-item"><div class="di-label">Urgency</div><div class="di-val">${ref.urgency ? `<span class="urgency-badge urg-${escHtml(ref.urgency)}">${escHtml(ref.urgency)}</span>` : '—'}</div></div>
        <div class="detail-item"><div class="di-label">Service Type</div><div class="di-val">${escHtml(ref.service_type || '—')}</div></div>
        <div class="detail-item"><div class="di-label">Channel</div><div class="di-val">${formatChannel(ref.delivery_channel)}</div></div>
        <div class="detail-item"><div class="di-label">CCN</div><div class="di-val">${escHtml(ref.facility_ccn || '—')}</div></div>
        <div class="detail-item"><div class="di-label">Created</div><div class="di-val">${formatDate(ref.created_at)}</div></div>
        <div class="detail-item"><div class="di-label">Sent</div><div class="di-val">${formatDate(ref.sent_at)}</div></div>
      </div>
      ${ref.referral_notes ? `<div style="margin-top:10px;font-size:.85rem;color:#475569;background:#f8fafc;padding:10px 12px;border-radius:6px;">${escHtml(ref.referral_notes)}</div>` : ''}
    </div>

    <div class="modal-section">
      <h4>Update Status</h4>
      <div class="status-update-form">
        <select id="status-select">
          <option value="draft">Draft</option>
          <option value="sent">Sent</option>
          <option value="pending_review">Pending Review</option>
          <option value="accepted">Accepted</option>
          <option value="declined">Declined</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <button class="btn-update-status" onclick="updateStatus(${ref.id})">Update</button>
      </div>
    </div>

    <div class="modal-section">
      <h4>Delivery Log (${log.length})</h4>
      <div class="delivery-log">
        ${log.length ? log.map(l => `
          <div class="log-row">
            <div class="log-icon">${l.success ? '✅' : '❌'}</div>
            <div class="log-detail">
              <span style="font-weight:600">${formatChannel(l.channel)}</span>
              ${l.reference_id ? `<span style="color:#64748b;font-size:.75rem;margin-left:6px">Ref: ${escHtml(l.reference_id)}</span>` : ''}
              ${l.error_message ? `<div style="color:#dc2626;font-size:.75rem">${escHtml(l.error_message)}</div>` : ''}
            </div>
            <div class="log-time">${formatDate(l.attempted_at)}</div>
          </div>
        `).join('') : '<p style="font-size:.85rem;color:#94a3b8;">No delivery attempts yet.</p>'}
      </div>
    </div>

    <div class="modal-section messages-section">
      <h4>Messages (${msgs.length})</h4>
      <div id="msgs-list">
        ${msgs.map(m => `
          <div class="msg-row">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span class="msg-author">${escHtml(m.author_email)}</span>
              <span class="msg-time">${formatDate(m.created_at)}</span>
            </div>
            <div class="msg-text">${escHtml(m.message_text)}</div>
          </div>
        `).join('') || '<p style="font-size:.85rem;color:#94a3b8;">No messages.</p>'}
      </div>
      <div class="add-msg-form">
        <textarea id="new-msg-text" rows="2" placeholder="Add a message or note…"></textarea>
        <button class="btn-msg" onclick="sendMessage(${ref.id})">Send</button>
      </div>
    </div>
  `;
  document.getElementById('status-select').value = ref.status || 'draft';
}

async function updateStatus(id) {
  const status = document.getElementById('status-select').value;
  try {
    const r = await fetch(`/api/referrals/${id}/status`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ status }),
    });
    if (!r.ok) { alert('Failed to update status.'); return; }
    const idx = referrals.findIndex(r => r.id === id);
    if (idx >= 0) referrals[idx].status = status;
    renderReferrals(referrals);
    updateStats(referrals);
    showToast('Status updated');
  } catch (e) {
    alert('Network error.');
  }
}

async function resendReferral(id) {
  if (!confirm('Resend this referral?')) return;
  try {
    const r = await fetch(`/api/referrals/${id}/resend`, { method: 'POST' });
    const data = await r.json();
    if (data.success) {
      showToast('Referral resent');
      loadReferrals();
    } else {
      alert('Resend failed: ' + (data.error || 'Unknown error'));
    }
  } catch (e) {
    alert('Network error.');
  }
}

async function sendMessage(id) {
  const text = document.getElementById('new-msg-text').value.trim();
  if (!text) return;
  try {
    const r = await fetch(`/api/referrals/${id}/messages`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message_text: text }),
    });
    if (!r.ok) { alert('Failed to send message.'); return; }
    document.getElementById('new-msg-text').value = '';
    openDetail(id);
  } catch (e) {
    alert('Network error.');
  }
}

async function loadAnalytics() {
  const section = document.getElementById('analytics-section');
  if (section.style.display !== 'none') { section.style.display = 'none'; return; }
  try {
    const r = await fetch('/api/referrals/analytics');
    const data = await r.json();
    renderAnalytics(data);
    section.style.display = '';
  } catch (e) {
    showError('Failed to load analytics.');
  }
}

function renderAnalytics(data) {
  const byStatus = data.by_status || {};
  const byChannel = data.by_channel || {};
  const maxStatus = Math.max(1, ...Object.values(byStatus));
  const maxChannel = Math.max(1, ...Object.values(byChannel));

  document.getElementById('bar-status').innerHTML = Object.entries(byStatus).map(([k, v]) => `
    <div class="bar-row">
      <div class="bar-label">${formatStatus(k)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(v/maxStatus*100).toFixed(0)}%"></div></div>
      <div class="bar-count">${v}</div>
    </div>
  `).join('') || '<p style="font-size:.85rem;color:#94a3b8;">No data.</p>';

  document.getElementById('bar-channel').innerHTML = Object.entries(byChannel).map(([k, v]) => `
    <div class="bar-row">
      <div class="bar-label">${formatChannel(k)}</div>
      <div class="bar-track"><div class="bar-fill" style="background:#16a34a;width:${(v/maxChannel*100).toFixed(0)}%"></div></div>
      <div class="bar-count">${v}</div>
    </div>
  `).join('') || '<p style="font-size:.85rem;color:#94a3b8;">No data.</p>';
}

function closeModal(event) {
  if (event.target === document.getElementById('detail-modal')) closeDetailModal();
}
function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('open');
}

function showError(msg) {
  document.getElementById('referral-list').innerHTML = `<div class="empty" style="color:#dc2626;">${escHtml(msg)}</div>`;
}

let toastTimer;
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1a56db;color:#fff;padding:10px 18px;border-radius:8px;font-size:.85rem;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:9999;'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.style.display = 'none', 3000);
}

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(s) {
  if (!s) return '—';
  try { return new Date(s).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
  catch { return s; }
}

function formatStatus(s) {
  const map = { draft:'Draft', sent:'Sent', pending_review:'Pending Review', accepted:'Accepted', declined:'Declined', cancelled:'Cancelled' };
  return map[s] || (s || 'Unknown');
}

function formatChannel(s) {
  const map = { fax:'Fax', direct:'Direct Msg', careport:'CarePort', manual:'Manual', email:'Email' };
  return map[s] || (s || '—');
}

loadReferrals();
</script>
</body>
</html>
