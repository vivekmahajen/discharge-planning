<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#00529B" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="DischargePlan" />
  <link rel="stylesheet" href="/static/mobile.css" />
  <title>Multilingual Instructions — Discharge Planning AI</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Source+Code+Pro:wght@400;500&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Source Sans 3", system-ui, sans-serif; background: #F5F3EE; }
    header {
      background: linear-gradient(135deg, #1a56db 0%, #1e40af 100%);
      color: white; padding: 10px 18px;
      display: flex; align-items: center; gap: 10px;
    }
    header .logo { font-size: 1.3rem; }
    header h1 { font-size: .95rem; font-weight: 700; }
    header p  { font-size: .68rem; opacity: .85; margin-top: 1px; }
    header .spacer { flex: 1; }
    header a {
      color: rgba(255,255,255,.85); text-decoration: none;
      font-size: .72rem; padding: 4px 10px; border-radius: 5px;
      background: rgba(255,255,255,.15); margin-left: 5px;
      transition: background .15s; white-space: nowrap;
    }
    header a:hover { background: rgba(255,255,255,.28); }
    header a.active { background: rgba(255,255,255,.35); font-weight: 600; }
    #root { min-height: calc(100vh - 52px); }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @media print {
      header, .no-print { display: none !important; }
      body { background: white !important; }
      .print-section { break-inside: avoid; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">&#127973;</div>
  <div>
    <h1>Discharge Planning AI</h1>
    <p>Multilingual Patient Instructions</p>
  </div>
  <div class="spacer"></div>
  <a href="/my-patients">My Patients</a>
  <a href="/">&#8592; Planner</a>
  <a href="/discharge-summary-generator">Summary</a>
  <a href="/teachback-checklist">Teach-back</a>
  <a href="/cdph-compliance">CDPH</a>
  <a href="/hrrp-flagging">HRRP</a>
  <a href="/roi-tracker">ROI</a>
  <a href="/readmission-tracker">Tracker</a>
  <a href="/imm-prompt-system">IMM</a>
  <a href="/multilingual-prompt-system" class="active">Multilingual</a>
  <a href="/post-acute-directory">Facilities</a>
  <a href="/predictive-discharge">Predict LOS</a>
  <a href="/api/auth/logout">Sign Out</a>
</header>

<div id="root"></div>

<script>
  fetch('/api/me').then(r => {
    if (!r.ok) window.location.href = '/login';
  }).catch(() => { window.location.href = '/login'; });
</script>

<script type="text/babel">
const { useState } = React;

const LANGUAGES = [
  { code: "es",    name: "Spanish",                flag: "MX", dir: "ltr" },
  { code: "zh-TW", name: "Cantonese Chinese",       flag: "HK", dir: "ltr" },
  { code: "zh-CN", name: "Mandarin Chinese",        flag: "CN", dir: "ltr" },
  { code: "vi",    name: "Vietnamese",              flag: "VN", dir: "ltr" },
  { code: "tl",    name: "Tagalog",                 flag: "PH", dir: "ltr" },
  { code: "ko",    name: "Korean",                  flag: "KR", dir: "ltr" },
  { code: "hy",    name: "Armenian",                flag: "AM", dir: "ltr" },
  { code: "fa",    name: "Persian / Farsi",         flag: "IR", dir: "rtl" },
  { code: "ru",    name: "Russian",                 flag: "RU", dir: "ltr" },
  { code: "km",    name: "Khmer",                   flag: "KH", dir: "ltr" },
  { code: "hi",    name: "Hindi",                   flag: "IN", dir: "ltr" },
  { code: "pa",    name: "Punjabi",                 flag: "IN", dir: "ltr" },
  { code: "ar",    name: "Arabic",                  flag: "SA", dir: "rtl" },
  { code: "pt",    name: "Portuguese (Brazilian)",  flag: "BR", dir: "ltr" },
  { code: "ja",    name: "Japanese",                flag: "JP", dir: "ltr" },
  { code: "ium",   name: "Mien / Iu Mien",          flag: "--", dir: "ltr" },
  { code: "hmn",   name: "Hmong",                   flag: "--", dir: "ltr" },
  { code: "so",    name: "Somali",                  flag: "SO", dir: "ltr" },
  { code: "am",    name: "Amharic",                 flag: "ET", dir: "ltr" },
  { code: "th",    name: "Thai",                    flag: "TH", dir: "ltr" },
];

const SAMPLE_PLAN = `{
  "diagnosis": {
    "primary": "Heart failure with reduced ejection fraction (HFrEF)",
    "source_content": "You have heart failure. This means your heart is not pumping blood as well as it should."
  },
  "medications": [
    { "name": "metoprolol succinate", "dose": "25 mg", "frequency": "once daily", "why": "to help your heart pump better" },
    { "name": "furosemide", "dose": "40 mg", "frequency": "once in the morning", "why": "to remove extra fluid from your body" },
    { "name": "lisinopril", "dose": "5 mg", "frequency": "once daily", "why": "to lower blood pressure and protect your heart" }
  ],
  "warning_signs": [
    { "sign": "Sudden weight gain of more than 2 pounds in one day", "action": "call_doctor", "urgency": "urgent" },
    { "sign": "Trouble breathing or chest pain", "action": "call_911", "urgency": "emergent" },
    { "sign": "Legs or ankles more swollen than usual", "action": "call_doctor", "urgency": "urgent" }
  ],
  "follow_up": {
    "appointments": [
      { "provider": "Cardiologist", "timeframe": "within 7 days", "reason": "heart failure follow-up", "instruction": "Call the cardiology office today to schedule." }
    ]
  },
  "activity_restrictions": { "source_content": "Rest at home. Do not lift anything heavier than 10 pounds. Walk short distances only. Stop if you feel short of breath." },
  "diet_instructions": { "source_content": "Limit salt to less than 2 grams per day. Limit fluids to 6 cups per day. Avoid canned soups and processed foods." },
  "when_to_call": {
    "er_instruction": "Go to the emergency room right away for chest pain, trouble breathing, or fainting.",
    "emergency_instruction": "Call 911 if you have severe chest pain or cannot breathe."
  }
}`;

const css = {
  wrap:   { maxWidth: 1100, margin: "0 auto", padding: "24px 16px" },
  card:   { background: "#fff", borderRadius: 10, padding: 24, marginBottom: 20, boxShadow: "0 1px 4px rgba(0,0,0,.08)" },
  label:  { display: "block", fontSize: ".8rem", fontWeight: 600, color: "#374151", marginBottom: 6 },
  select: { width: "100%", padding: "9px 12px", border: "1.5px solid #d1d5db", borderRadius: 7, fontSize: ".9rem", background: "#fff" },
  ta:     { width: "100%", padding: "10px 12px", border: "1.5px solid #d1d5db", borderRadius: 7, fontSize: ".82rem", fontFamily: "'Source Code Pro', monospace", resize: "vertical" },
  btn:    { background: "#1a56db", color: "#fff", border: "none", padding: "10px 24px", borderRadius: 7, fontSize: ".9rem", fontWeight: 600, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 8 },
  btnSec: { background: "#f3f4f6", color: "#374151", border: "1px solid #d1d5db", padding: "8px 16px", borderRadius: 7, fontSize: ".85rem", fontWeight: 500, cursor: "pointer" },
  secTitle: { fontSize: ".95rem", fontWeight: 700, color: "#1e3a8a", marginBottom: 12 },
  grid:   { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 },
  colHd:  { fontSize: ".72rem", fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 6 },
};

function badge(color) {
  const map = {
    red:   { bg: "#fee2e2", fg: "#991b1b" },
    amber: { bg: "#fef3c7", fg: "#92400e" },
    green: { bg: "#dcfce7", fg: "#166534" },
    blue:  { bg: "#e0e7ff", fg: "#3730a3" },
  };
  const c = map[color] || map.blue;
  return { display: "inline-block", padding: "2px 10px", borderRadius: 20, fontSize: ".72rem", fontWeight: 700, background: c.bg, color: c.fg };
}

function Spinner() {
  return (
    <span style={{ display:"inline-block", width:16, height:16, border:"2px solid rgba(255,255,255,.4)", borderTopColor:"#fff", borderRadius:"50%", animation:"spin .7s linear infinite" }} />
  );
}

function BiRow({ src, tgt, dir }) {
  if (!src && !tgt) return null;
  return (
    <div style={css.grid}>
      <div>
        <div style={css.colHd}>English (Source)</div>
        <div style={{ fontSize:".88rem", color:"#374151", lineHeight:1.6 }}>{src || "—"}</div>
      </div>
      <div>
        <div style={css.colHd}>Translation</div>
        <div dir={dir} style={{ fontSize:".88rem", color:"#111827", lineHeight:1.6 }}>{tgt || "—"}</div>
      </div>
    </div>
  );
}

function MedCard({ med, dir }) {
  return (
    <div style={{ borderLeft:"3px solid #3b82f6", paddingLeft:12, marginBottom:14 }}>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
        <strong style={{ fontSize:".9rem" }}>{med.name_display || med.name}</strong>
        <span style={{ fontSize:".75rem", background:"#e0e7ff", color:"#3730a3", padding:"1px 8px", borderRadius:12, fontWeight:600 }}>{med.dose} &middot; {med.frequency}</span>
      </div>
      <div style={css.grid}>
        <div style={{ fontSize:".82rem", color:"#6b7280" }}>{med.source_instruction || ""}</div>
        <div dir={dir} style={{ fontSize:".82rem", color:"#111827" }}>{med.instruction || ""}</div>
      </div>
      {med.why && <div style={{ fontSize:".76rem", color:"#4b5563", marginTop:4 }}><em>Why: {med.why}</em></div>}
    </div>
  );
}

function WarnCard({ ws, dir }) {
  const c = ws.urgency === "emergent" ? "red" : ws.urgency === "urgent" ? "amber" : "green";
  return (
    <div style={{ display:"flex", gap:10, marginBottom:10, alignItems:"flex-start" }}>
      <span style={{ ...badge(c), flexShrink:0, marginTop:2 }}>{ws.urgency || "routine"}</span>
      <div style={{ flex:1 }}>
        <div style={css.grid}>
          <div style={{ fontSize:".85rem", color:"#374151" }}>{ws.source_sign || ws.sign}</div>
          <div dir={dir} style={{ fontSize:".85rem", color:"#111827" }}>{ws.sign}</div>
        </div>
        {ws.action_text && <div style={{ fontSize:".78rem", color:"#dc2626", marginTop:2 }} dir={dir}>{ws.action_text}</div>}
      </div>
    </div>
  );
}

function Output({ data, dir }) {
  const t = data.translation;
  const meta = t.meta || {};
  return (
    <div style={{ animation:"fadeIn .3s ease" }}>
      {/* Status bar */}
      <div style={{ ...css.card, background: meta.requires_clinician_review ? "#fef2f2" : meta.interpreter_recommended ? "#fffbeb" : "#f0fdf4", display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
        <strong style={{ fontSize:".85rem" }}>Translation status:</strong>
        {meta.requires_clinician_review
          ? <span style={badge("red")}>&#9888; Clinician review required</span>
          : <span style={badge("green")}>&#10003; No review flags</span>}
        {meta.interpreter_recommended && <span style={badge("amber")}>Interpreter recommended</span>}
        {(meta.review_reasons || []).map((r, i) =>
          <span key={i} style={{ fontSize:".74rem", color:"#991b1b" }}>&#8226; {r}</span>
        )}
        <div style={{ marginLeft:"auto", fontSize:".74rem", color:"#6b7280" }}>
          Language: {meta.target_language_name || data.language} &middot; Generated {new Date(meta.generated_at || Date.now()).toLocaleTimeString()}
        </div>
      </div>

      {/* Patient header */}
      {t.patient_header && (t.patient_header.greeting || t.patient_header.source_greeting) && (
        <div style={css.card} className="print-section">
          <div style={css.secTitle}>Patient Greeting</div>
          <BiRow src={t.patient_header.source_greeting} tgt={t.patient_header.greeting} dir={dir} />
        </div>
      )}

      {/* Diagnosis */}
      {t.diagnosis && (
        <div style={css.card} className="print-section">
          <div style={css.secTitle}>Diagnosis</div>
          <BiRow src={t.diagnosis.source_content} tgt={t.diagnosis.content} dir={dir} />
        </div>
      )}

      {/* Medications */}
      {t.medications && t.medications.length > 0 && (
        <div style={css.card} className="print-section">
          <div style={css.secTitle}>Medications ({t.medications.length})</div>
          {t.medications.map((m, i) => <MedCard key={i} med={m} dir={dir} />)}
        </div>
      )}

      {/* Warning signs */}
      {t.warning_signs && t.warning_signs.length > 0 && (
        <div style={{ ...css.card, borderLeft:"4px solid #ef4444" }} className="print-section">
          <div style={css.secTitle}>&#9888; Warning Signs &mdash; When to Seek Help</div>
          {t.warning_signs.map((w, i) => <WarnCard key={i} ws={w} dir={dir} />)}
        </div>
      )}

      {/* Activity / Diet / Wound */}
      {[["activity_restrictions","Activity Restrictions"],["diet_instructions","Diet Instructions"],["wound_care","Wound Care"]].map(([key, title]) =>
        t[key] && (t[key].content || t[key].source_content) ? (
          <div key={key} style={css.card} className="print-section">
            <div style={css.secTitle}>{title}</div>
            <BiRow src={t[key].source_content} tgt={t[key].content} dir={dir} />
          </div>
        ) : null
      )}

      {/* Follow-up */}
      {t.follow_up && t.follow_up.appointments && t.follow_up.appointments.length > 0 && (
        <div style={css.card} className="print-section">
          <div style={css.secTitle}>Follow-up Appointments</div>
          {t.follow_up.appointments.map((apt, i) => (
            <div key={i} style={{ borderBottom:"1px solid #e5e7eb", paddingBottom:10, marginBottom:10 }}>
              <div style={{ fontWeight:600, fontSize:".88rem", marginBottom:6 }}>{apt.provider} &mdash; {apt.timeframe}</div>
              <BiRow src={apt.source_instruction} tgt={apt.instruction} dir={dir} />
            </div>
          ))}
        </div>
      )}

      {/* When to call */}
      {t.when_to_call && (
        <div style={{ ...css.card, background:"#fef2f2" }} className="print-section">
          <div style={css.secTitle}>&#128680; When to Call for Help</div>
          {t.when_to_call.er_instruction && (
            <BiRow src={t.when_to_call.er_instruction} tgt={t.when_to_call.er_instruction} dir={dir} />
          )}
          {t.when_to_call.emergency_instruction && (
            <div style={{ background:"#dc2626", color:"#fff", padding:"8px 14px", borderRadius:6, fontSize:".88rem", fontWeight:600, marginTop:10 }} dir={dir}>
              {t.when_to_call.emergency_instruction}
            </div>
          )}
        </div>
      )}

      {/* Teach-back prompt */}
      {t.teach_back_prompt && (
        <div style={css.card} className="print-section">
          <div style={css.secTitle}>Teach-back Prompt</div>
          <div dir={dir} style={{ fontSize:".88rem", color:"#1e40af", fontStyle:"italic" }}>{t.teach_back_prompt}</div>
        </div>
      )}

      {/* Cultural adaptations (screen only) */}
      {(meta.cultural_adaptations || []).length > 0 && (
        <div style={{ ...css.card, background:"#f0f9ff" }} className="no-print">
          <div style={{ fontSize:".8rem", fontWeight:700, color:"#075985", marginBottom:8 }}>Cultural adaptations applied</div>
          {meta.cultural_adaptations.map((a, i) => <div key={i} style={{ fontSize:".78rem", color:"#0c4a6e" }}>&#8226; {a}</div>)}
        </div>
      )}

      {/* Attestation */}
      {t.attestation && (
        <div style={{ fontSize:".72rem", color:"#9ca3af", marginTop:8, paddingTop:8, borderTop:"1px solid #e5e7eb" }} className="print-section">
          {t.attestation}
        </div>
      )}
    </div>
  );
}

function App() {
  const [lang, setLang]       = useState("es");
  const [planText, setPlanText] = useState("");
  const [useSample, setUseSample] = useState(false);
  const [loading, setLoading] = useState(false);
  const [result, setResult]   = useState(null);
  const [error, setError]     = useState("");

  const selected = LANGUAGES.find(l => l.code === lang) || LANGUAGES[0];

  const generate = async () => {
    const text = useSample ? SAMPLE_PLAN : planText;
    if (!text.trim()) { setError("Paste a discharge plan or click 'Use sample plan'."); return; }
    setLoading(true); setError(""); setResult(null);
    try {
      const res = await fetch("/api/multilingual/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ target_language: lang, discharge_plan: text }),
      });
      const data = await res.json();
      if (!res.ok || !data.success) {
        setError(data.error || "Translation failed.");
      } else {
        setResult(data);
      }
    } catch (e) {
      setError("Network error — please try again.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={css.wrap}>
      {/* Header card */}
      <div style={{ ...css.card, borderLeft:"4px solid #1a56db" }}>
        <div style={{ fontSize:"1.05rem", fontWeight:700, color:"#1e3a8a", marginBottom:4 }}>
          Multilingual Patient Discharge Instructions
        </div>
        <div style={{ fontSize:".82rem", color:"#6b7280" }}>
          Title VI / California Gov. Code 7290 / CDPH CoP &middot; 20 languages &middot; 6th-grade reading level &middot; Bilingual side-by-side output &middot; Clinical accuracy validated
        </div>
      </div>

      {/* Input controls */}
      <div style={css.card}>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:20 }}>
          <div>
            <label style={css.label}>Target Language</label>
            <select style={css.select} value={lang} onChange={e => setLang(e.target.value)}>
              {LANGUAGES.map(l => (
                <option key={l.code} value={l.code}>{l.name}{l.dir === "rtl" ? " (RTL)" : ""}</option>
              ))}
            </select>
            {selected.dir === "rtl" && (
              <div style={{ fontSize:".72rem", color:"#b45309", marginTop:4 }}>Right-to-left script &mdash; text direction applied automatically</div>
            )}
            {["ium","hmn","km"].includes(lang) && (
              <div style={{ fontSize:".72rem", color:"#6d28d9", marginTop:4 }}>Interpreter recommendation will be auto-set for this language group</div>
            )}
          </div>
          <div style={{ display:"flex", alignItems:"flex-end" }}>
            <div style={{ fontSize:".78rem", color:"#6b7280", lineHeight:1.5 }}>
              Covers ~97% of California LEP hospital volume. Drug names and dosages are preserved exactly. Warning signs translated with equal urgency.
            </div>
          </div>
        </div>

        <div style={{ marginBottom:16 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
            <label style={css.label}>English Discharge Plan (JSON or plain text)</label>
            <button style={css.btnSec} onClick={() => { setUseSample(v => !v); setPlanText(""); }}>
              {useSample ? "Clear sample" : "Use sample plan"}
            </button>
          </div>
          <textarea
            style={{ ...css.ta, minHeight:200, background: useSample ? "#f9fafb" : "#fff" }}
            placeholder='Paste the discharge plan JSON output here, or click "Use sample plan" to test with a heart failure case...'
            value={useSample ? SAMPLE_PLAN : planText}
            onChange={e => { setUseSample(false); setPlanText(e.target.value); }}
            readOnly={useSample}
          />
        </div>

        <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
          <button style={{ ...css.btn, opacity: loading ? .7 : 1 }} onClick={generate} disabled={loading} data-requires-network="true">
            {loading ? <><Spinner /> Translating&hellip;</> : `Translate to ${selected.name}`}
          </button>
          {result && (
            <button style={css.btnSec} onClick={() => window.print()} className="no-print">
              Print bilingual document
            </button>
          )}
        </div>

        {error && (
          <div style={{ marginTop:12, padding:"10px 14px", background:"#fef2f2", border:"1px solid #fecaca", borderRadius:7, fontSize:".85rem", color:"#dc2626" }}>
            {error}
          </div>
        )}
      </div>

      {result && <Output data={result} dir={selected.dir} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
  <script src="/static/pwa.js" defer></script>
</body>
</html>
