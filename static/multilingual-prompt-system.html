ACCURACY RULES — non-negotiable:

- Target 6th-grade reading level in the target language (not 6th-grade English — 6th-grade equivalent in the target language)

const INTEGRATION_CODE = `// api/translate/discharge.js
// Actions: detect_language, translate, back_translate, attest

import { createClient } from '@supabase/supabase-js';
const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_KEY);

const LANGUAGES = [
  { code: "es",  name: "Spanish",    native: "Español"    },
  { code: "vi",  name: "Vietnamese", native: "Tiếng Việt" },
  { code: "hmn", name: "Hmong",      native: "Hmoob"      },
  { code: "ru",  name: "Russian",    native: "Русский"    },
  { code: "tl",  name: "Tagalog",    native: "Tagalog"    },
  { code: "zh",  name: "Chinese",    native: "中文"        },
  { code: "ar",  name: "Arabic",     native: "العربية"    },
  { code: "ko",  name: "Korean",     native: "한국어"      },
];

export async function POST(req) {
  const { action, payload, staffId } = await req.json();

  switch (action) {

    case 'detect_language': {
      const prompt = LANGUAGE_DETECT_PROMPT
        .replace('{{REPORTED_PREFERENCE}}', payload.reportedPreference || 'unknown')
        .replace('{{STAFF_NOTES}}',         payload.staffNotes || 'none')
        .replace('{{INTERPRETER_REQUEST}}', payload.interpreterRequest || 'none')
        .replace('{{PRIOR_LANGUAGE}}',      payload.priorLanguage || 'unknown')
        .replace('{{ZIP_CODE}}',            payload.zipCode || 'unknown')
        .replace('{{NAME_ORIGIN}}',         payload.nameOrigin || 'not provided');
      const data = parseJSON(await callClaude(prompt, 800));
      return Response.json({ success: true, detection: data });
    }

    case 'translate': {
      const { encounterId, patientId, targetLanguage, sourceInstructions, patientContext } = payload;
      const lang = LANGUAGES.find(l => l.code === targetLanguage);
      if (!lang) return Response.json({ error: 'Unsupported language' }, { status: 400 });

      const userPrompt = TRANSLATION_PROMPT
        .replace(/{{TARGET_LANGUAGE}}/g,         lang.name)
        .replace(/{{TARGET_LANGUAGE_NATIVE}}/g,  lang.native)
        .replace(/{{TARGET_LANGUAGE_CODE}}/g,    lang.code)
        .replace('{{PATIENT_AGE}}',              patientContext.age)
        .replace('{{LITERACY_LEVEL}}',           patientContext.literacyLevel || 'moderate')
        .replace('{{CULTURAL_BACKGROUND}}',      patientContext.culturalBackground || lang.name)
        .replace('{{INTERPRETER_NAME}}',         patientContext.interpreterName || 'Language Line')
        .replace('{{INTERPRETER_SERVICE}}',      patientContext.interpreterService || 'Language Line Solutions')
        .replace('{{INTERPRETER_TYPE}}',         patientContext.interpreterType || 'telephone')
        .replace('{{PRIMARY_DIAGNOSIS}}',        patientContext.primaryDiagnosis)
        .replace('{{DISCHARGE_DESTINATION}}',    patientContext.dischargeDestination)
        .replace('{{SOURCE_INSTRUCTIONS_JSON}}', JSON.stringify(sourceInstructions, null, 2));

      const translation = parseJSON(await callClaude(userPrompt, 4000));

      // Auto back-translation QA on warning signs
      let backTranslation = null;
      if (translation.translated_instructions?.warning_signs?.length > 0) {
        const firstWarning = translation.translated_instructions.warning_signs[0];
        const btPrompt = BACK_TRANSLATION_PROMPT
          .replace('{{ORIGINAL_ENGLISH}}',   sourceInstructions.warning_signs?.[0]?.sign || '')
          .replace(/{{TARGET_LANGUAGE}}/g,   lang.name)
          .replace('{{TRANSLATED_TEXT}}',    firstWarning.sign_translated || '');
        backTranslation = parseJSON(await callClaude(btPrompt, 1000));

        if (backTranslation.overall_assessment === 'reject' ||
            backTranslation.discrepancies?.some(d => d.severity === 'critical')) {
          translation.translation_metadata.flagged_for_review = true;
          translation.translation_metadata.review_reasons.push(
            'Critical back-translation discrepancy in warning signs — professional review required'
          );
        }
      }

      const { data: stored, error } = await supabase
        .from('discharge_translations')
        .insert({
          encounter_id:          encounterId,
          patient_id:            patientId,
          target_language_code:  lang.code,
          target_language_name:  lang.name,
          source_instructions:   sourceInstructions,
          translation:           translation,
          back_translation_qa:   backTranslation,
          flagged_for_review:    translation.translation_metadata.flagged_for_review,
          overall_confidence:    translation.translation_metadata.overall_confidence,
          interpreter_name:      patientContext.interpreterName,
          interpreter_service:   patientContext.interpreterService,
          written_copy_provided: false,
          attestation_pending:   true,
          created_by:            staffId,
          created_at:            new Date().toISOString(),
        })
        .select().single();

      if (error) throw error;
      return Response.json({ success: true, translation, backTranslation, translationId: stored.id });
    }

    case 'back_translate': {
      const { originalEnglish, translatedText, targetLanguage } = payload;
      const lang = LANGUAGES.find(l => l.code === targetLanguage);
      const prompt = BACK_TRANSLATION_PROMPT
        .replace('{{ORIGINAL_ENGLISH}}',   originalEnglish)
        .replace(/{{TARGET_LANGUAGE}}/g,   lang.name)
        .replace('{{TRANSLATED_TEXT}}',    translatedText);
      const data = parseJSON(await callClaude(prompt, 1000));
      return Response.json({ success: true, qa: data });
    }

    case 'attest': {
      const { translationId } = payload;
      await supabase.from('discharge_translations')
        .update({ written_copy_provided: true, attestation_pending: false,
                  attested_at: new Date().toISOString(), attested_by: staffId })
        .eq('id', translationId);
      await supabase.from('audit_log').insert({
        action: 'TRANSLATION_ATTESTED', table_name: 'discharge_translations',
        record_id: translationId, performed_by: staffId,
        timestamp: new Date().toISOString(),
        summary: 'Discharge translation attested — written copy provided to patient'
      });
      return Response.json({ success: true });
    }

    default:
      return Response.json({ error: 'Unknown action' }, { status: 400 });
  }
}

async function callClaude(userPrompt, maxTokens = 2000) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      temperature: 0,
      system: SYSTEM_PROMPT,
      messages: [{ role: 'user', content: userPrompt }]
    })
  });
  const data = await res.json();
  return data.content[0].text;
}

function parseJSON(raw) {
  const clean = raw.replace(/^\`\`\`json\n?/, '').replace(/\n?\`\`\`$/, '').trim();
  return JSON.parse(clean);
}`;

const DB_SCHEMA = `-- Discharge translations (one row per language per encounter)
CREATE TABLE discharge_translations (
  id                      uuid PRIMARY KEY DEFAULT gen_random_uuid(),
  encounter_id            uuid NOT NULL REFERENCES encounters(id),
  patient_id              uuid NOT NULL REFERENCES patients(id),

  target_language_code    text NOT NULL,
  target_language_name    text NOT NULL,
  dialect_notes           text,

  source_instructions     jsonb NOT NULL,
  translation             jsonb NOT NULL,
  back_translation_qa     jsonb,

  overall_confidence      numeric(3,2),
  flagged_for_review      boolean DEFAULT false,
  review_resolved_by      uuid REFERENCES staff(id),
  review_resolved_at      timestamptz,

  interpreter_name        text,
  interpreter_service     text,
  interpreter_type        text CHECK (interpreter_type IN (
                            'professional_in_person','telephone','staff','none')),

  written_copy_provided   boolean DEFAULT false,
  verbal_review_completed boolean DEFAULT false,
  attestation_pending     boolean DEFAULT true,
  attested_at             timestamptz,
  attested_by             uuid REFERENCES staff(id),

  created_by              uuid NOT NULL REFERENCES staff(id),
  created_at              timestamptz DEFAULT now(),

  UNIQUE (encounter_id, target_language_code, created_at)
);

-- Print job log — California Title 22 compliance evidence
CREATE TABLE translation_print_jobs (
  id              uuid PRIMARY KEY DEFAULT gen_random_uuid(),
  translation_id  uuid NOT NULL REFERENCES discharge_translations(id),
  encounter_id    uuid NOT NULL REFERENCES encounters(id),
  printed_by      uuid REFERENCES staff(id),
  print_format    text CHECK (print_format IN ('bilingual','target_only','large_print')),
  copies_printed  integer DEFAULT 1,
  delivered_to    text CHECK (delivered_to IN ('patient','representative','mailed','emailed')),
  printed_at      timestamptz DEFAULT now()
);

CREATE INDEX idx_trans_encounter ON discharge_translations(encounter_id);
CREATE INDEX idx_trans_flagged   ON discharge_translations(flagged_for_review) WHERE flagged_for_review = true;
CREATE INDEX idx_trans_pending   ON discharge_translations(attestation_pending) WHERE attestation_pending = true;`;

    items: [
      "Medication names — generic and brand. 'Lisinopril (Zestril)' stays as-is in every language. Translation of drug names causes dangerous dosing errors.",
      "Dosing numbers and units — '10mg twice daily', '500mg with food', '2 puffs every 4 hours'. Keep exactly as written.",
      "Phone numbers — 911, hospital numbers, doctor's office. Numbers are universal.",
      "Provider names, hospital names, clinic names — these are proper nouns and must not be altered.",
      "ICD-10 codes if shown — clinical codes are not patient-facing but if present, keep as-is.",
      "The legal attestation statement — liability language stays in English, translated version appears alongside.",
    ],
  },
  {
    title: "California language access law",
    color: "#0C447C", bg: "#E6F1FB",
    items: [
      "California Health & Safety Code §1259: patients with limited English proficiency have the right to a qualified interpreter at no cost, at any time.",
      "Dymally-Alatorre Bilingual Services Act: state-funded entities must provide translated materials for language groups exceeding 5% of the patient population served.",
      "Title 22 CCR: written discharge instructions must be provided in the patient's primary language when the patient has limited English proficiency.",
      "Family members are NOT acceptable interpreters for discharge instructions, informed consent, or rights notification — California Title 22 requires a qualified professional interpreter.",
      "Document the interpreter's full name, agency/service, and language in the medical record — every time. This is your compliance evidence.",
      "Failure to provide language access can constitute discriminatory treatment under both state law and Section 1557 of the ACA.",
    ],
  },
  {
    title: "Health literacy & cultural adaptation",
    color: "#0F6E56", bg: "#E1F5EE",
    items: [
      "6th-grade reading level means 6th-grade equivalent in the TARGET language — not a literal translation of 6th-grade English.",
      "Hmong: acknowledge the role of traditional healers (txiv neeb) in healing decisions. Never dismiss — instead clarify what is medically required alongside traditional practices.",
      "Vietnamese: dietary examples should reference rice-based meals, phở, congee when clinically equivalent to English food examples (e.g., 'bland diet' → rice porridge).",
      "Russian: older patients may have distrust of institutional healthcare. Use formal address (Вы, not ты) and clear, factual language without perceived condescension.",
      "Spanish: distinguish between Mexican/Central American Spanish (dominant in Sacramento) vs. other dialects for idioms and health vocabulary. 'Pastillas' over 'tabletas' for tablets in most communities.",
      "For patients with low health literacy in any language: sentences ≤12 words, pictogram supplements, and large-print layout are strongly recommended.",
    ],
  },
  {
    title: "Back-translation QA process",
    color: "#5F3F8A", bg: "#EEEDFE",
    items: [
      "Warning signs and medication instructions require automatic back-translation QA before the document is delivered to the patient.",
      "A 'critical' back-translation discrepancy (meaning changed to the point of potential harm) must block delivery until a professional reviewer corrects the translation.",
      "Back-translation is not a perfect quality check — it only catches the most severe semantic drift. Professional human review is the gold standard for all critical languages.",
      "Match score < 0.85 on any safety-critical section should trigger a planner alert and require supervisor sign-off before attestation.",
      "Log all QA results — if a translation is ever challenged in litigation, the back-translation record shows your quality process was rigorous.",
    ],
  },
  {
    title: "Print & delivery requirements",
    color: "#6B4A10", bg: "#FAEEDA",
    items: [
      "Bilingual layout (English + target language side by side) is recommended for most patients — it allows staff to point to sections during verbal review.",
      "Arabic, Hebrew, Urdu, Farsi: right-to-left text direction. Your PDF renderer must support RTL — test this before go-live.",
      "Hmong requires Unicode UTF-8 with PUA (Private Use Area) encoding for some characters — standard fonts may render incorrectly. Use Noto Sans Hmong.",
      "Large-print version (≥14pt body text) must be available for patients ≥65 or with documented visual impairment — California Unruh Act applies.",
      "A printed copy must be given to the patient before discharge — verbal-only translation does not satisfy California Title 22 requirements.",
      "Log the print job: who printed it, how many copies, and who received it (patient, representative, mailed). This is your compliance record.",
    ],
  },
];

const TABS = [
  { id: "system",    label: "System prompt"      },
  { id: "translate", label: "Translation prompt"  },
  { id: "detect",    label: "Language detection"  },
  { id: "backxl",    label: "Back-translation QA" },
  { id: "code",      label: "API + DB schema"     },
  { id: "rules",     label: "Compliance rules"    },
];

const CONTENT = {
  system:    SYSTEM_PROMPT,
  translate: TRANSLATION_PROMPT,
  detect:    LANGUAGE_DETECT_PROMPT,
  backxl:    BACK_TRANSLATION_PROMPT,
};

const META = {
  system:    { title: "System prompt",            sub: "Medical interpreter persona, Title 22 constraints, what must never be translated. Sent with every call." },
  translate: { title: "Translation prompt",        sub: "Full template with 12 variables. Returns bilingual JSON with confidence scores, cultural adaptations, and back-translation sample." },
  detect:    { title: "Language detection prompt", sub: "Lightweight prompt to identify preferred language and dialect from intake data. Returns interpreter recommendation and literacy flags." },
  backxl:    { title: "Back-translation QA",       sub: "Safety check: translates back to English and flags semantic drift. Auto-runs on warning signs before every delivery." },
  code:      { title: "API route / Database schema", sub: "Four actions: detect_language, translate, back_translate, attest. Auto-QA on warning signs before delivery." },
  rules:     { title: "Compliance rules",           sub: "California Title 22, Dymally-Alatorre, ACA §1557, health literacy standards, print requirements." },
};

function MultilingualPromptSystem() {
  const [activeTab, setActiveTab] = useState("system");
  const [codeView, setCodeView] = useState("api");
  const [copied, setCopied] = useState(null);

  const copy = (text, id) => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(id);
      setTimeout(() => setCopied(null), 2200);
    });
  };

  const getContent = () => {
    if (activeTab === "code") return codeView === "api" ? INTEGRATION_CODE : DB_SCHEMA;
    return CONTENT[activeTab] || "";
  };

  const getFilename = () => {
    const map = {
      system:    "multilingual_system_prompt.txt",
      translate: "translation_prompt_template.txt",
      detect:    "language_detection_prompt.txt",
      backxl:    "back_translation_qa_prompt.txt",
    };
    if (activeTab === "code") return codeView === "api" ? "api/translate/discharge.js" : "schema/translations.sql";
    return map[activeTab] || "";
  };

  return (
    <div style={{ fontFamily: "'Helvetica Neue',Arial,sans-serif", background: "#F5F4F0", minHeight: "100vh", color: "#1A1917" }}>

      {/* Module header */}
      <div style={{ background: "#0C2340", padding: "26px 30px 20px", borderBottom: "3px solid #1D9E75" }}>
        <div style={{ fontSize: 10, letterSpacing: "0.18em", color: "#5A7A9A", textTransform: "uppercase", marginBottom: 7 }}>
          Discharge Planning AI · Language Access Module
        </div>
        <h1 style={{ fontSize: 22, fontWeight: 700, color: "#EFF4F8", margin: "0 0 5px", letterSpacing: "-0.2px" }}>
          Multilingual Discharge Instructions
        </h1>
        <p style={{ fontSize: 12, color: "#6A8FAA", margin: 0, lineHeight: 1.5 }}>
          California Title 22 · Dymally-Alatorre · ACA §1557 · Back-translation QA · 8 languages
        </p>
        <div style={{ display: "flex", gap: 6, marginTop: 14, flexWrap: "wrap" }}>
          {LANGUAGES.map(l => (
            <div key={l.code} style={{ background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 5, padding: "4px 10px", display: "flex", gap: 6, alignItems: "center" }}>
              <span style={{ fontSize: 13 }}>{l.flag}</span>
              <span style={{ fontSize: 11, color: "#B0C8DA" }}>{l.native}</span>
              <span style={{ fontSize: 10, color: "#4A6A80" }}>{l.population}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ background: "#091C30", display: "flex", overflowX: "auto", borderBottom: "1px solid #1A3050" }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
            background: activeTab === t.id ? "#0C2340" : "transparent",
            border: "none", borderBottom: activeTab === t.id ? "2px solid #1D9E75" : "2px solid transparent",
            color: activeTab === t.id ? "#EFF4F8" : "#4A6A80",
            padding: "10px 18px", fontSize: 12, cursor: "pointer", fontFamily: "inherit",
            whiteSpace: "nowrap", letterSpacing: "0.02em", transition: "all .15s",
          }}>{t.label}</button>
        ))}
      </div>

      <div style={{ padding: "22px 28px", maxWidth: 920 }}>

        {activeTab !== "rules" && (
          <div>
            {activeTab === "code" && (
              <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                {[["api","API route"],["db","DB schema"]].map(([v, label]) => (
                  <button key={v} onClick={() => setCodeView(v)} style={{
                    background: codeView === v ? "#1D9E75" : "transparent",
                    color: codeView === v ? "#fff" : "#777",
                    border: "1px solid " + (codeView === v ? "#1D9E75" : "#ccc"),
                    padding: "4px 14px", borderRadius: 4, fontSize: 11,
                    cursor: "pointer", fontFamily: "inherit",
                  }}>{label}</button>
                ))}
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#1A1917", marginBottom: 3 }}>{META[activeTab]?.title}</div>
                <div style={{ fontSize: 12, color: "#777", lineHeight: 1.5, maxWidth: 560 }}>{META[activeTab]?.sub}</div>
              </div>
              <button onClick={() => copy(getContent(), activeTab)} style={{
                background: copied === activeTab ? "#1D9E75" : "#0C2340",
                color: "#fff", border: "none", padding: "7px 16px", borderRadius: 4,
                fontSize: 11, cursor: "pointer", fontFamily: "inherit",
                flexShrink: 0, marginLeft: 12, transition: "background .2s",
              }}>
                {copied === activeTab ? "✓ Copied" : "Copy"}
              </button>
            </div>

            {activeTab === "translate" && (
              <div style={{ background: "#E6F1FB", border: "1px solid #B5D4F4", borderRadius: 6, padding: "9px 13px", marginBottom: 12, fontSize: 12, color: "#0C447C", lineHeight: 1.6 }}>
                <strong>12 template variables</strong> — replace all <code style={{ background: "rgba(0,0,0,0.07)", padding: "1px 5px", borderRadius: 3, fontSize: 10 }}>{"{{VARIABLE}}"}</code> tokens server-side. Pass the English source instructions as a JSON object so Claude preserves structure in the translation output.
              </div>
            )}
            {activeTab === "backxl" && (
              <div style={{ background: "#E1F5EE", border: "1px solid #9FE1CB", borderRadius: 6, padding: "9px 13px", marginBottom: 12, fontSize: 12, color: "#0F6E56", lineHeight: 1.6 }}>
                <strong>Auto-runs on warning signs</strong> before every delivery. Critical discrepancy blocks attestation and surfaces a planner alert. Run manually on any section via the <code style={{ background: "rgba(0,0,0,0.07)", padding: "1px 5px", borderRadius: 3, fontSize: 10 }}>back_translate</code> action.
              </div>
            )}
            {activeTab === "code" && codeView === "db" && (
              <div style={{ background: "#FAEEDA", border: "1px solid #FAC775", borderRadius: 6, padding: "9px 13px", marginBottom: 12, fontSize: 12, color: "#6B4A10", lineHeight: 1.6 }}>
                <strong>Print job logging</strong> is a separate table — track every copy printed, format used, and who received it. This is your California Title 22 compliance evidence. Sign a Supabase BAA before storing real PHI.
              </div>
            )}

            <div style={{ background: "#0A1929", borderRadius: 8, border: "1px solid #1A3050", overflow: "hidden" }}>
              <div style={{ background: "#0C2340", padding: "8px 14px", display: "flex", gap: 6, alignItems: "center", borderBottom: "1px solid #1A3050" }}>
                <span style={{ width: 9, height: 9, borderRadius: "50%", background: "#C04028" }}></span>
                <span style={{ width: 9, height: 9, borderRadius: "50%", background: "#BA7517" }}></span>
                <span style={{ width: 9, height: 9, borderRadius: "50%", background: "#1D9E75" }}></span>
                <span style={{ fontSize: 10, color: "#3A5A70", marginLeft: 8 }}>{getFilename()}</span>
              </div>
              <pre style={{
                margin: 0, padding: "18px 20px",
                color: "#9ABCCC", fontFamily: "'Menlo','Monaco','Courier New',monospace",
                fontSize: 11, lineHeight: 1.75, overflow: "auto", maxHeight: 500,
                whiteSpace: "pre-wrap", wordBreak: "break-word",
              }}>{getContent()}</pre>
            </div>

            <div style={{ marginTop: 8, display: "flex", gap: 14, flexWrap: "wrap" }}>
              {activeTab === "system"    && <><span style={{ fontSize: 11, color: "#999" }}>~{Math.round(SYSTEM_PROMPT.length/4)} tokens</span><span style={{ fontSize: 11, color: "#999" }}>temperature: 0 · Sent with every call</span></>}
              {activeTab === "translate" && <><span style={{ fontSize: 11, color: "#999" }}>~{Math.round(TRANSLATION_PROMPT.length/4)} tokens base</span><span style={{ fontSize: 11, color: "#999" }}>max_tokens: 4000 · temperature: 0</span></>}
              {activeTab === "detect"    && <><span style={{ fontSize: 11, color: "#999" }}>Lightweight · max_tokens: 600</span><span style={{ fontSize: 11, color: "#999" }}>Run at admission intake</span></>}
              {activeTab === "backxl"    && <><span style={{ fontSize: 11, color: "#999" }}>Safety check · max_tokens: 1000</span><span style={{ fontSize: 11, color: "#999" }}>Auto-triggered on warning signs</span></>}
            </div>
          </div>
        )}

        {activeTab === "rules" && (
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#1A1917", marginBottom: 4 }}>Compliance rules reference</div>
            <div style={{ fontSize: 12, color: "#888", marginBottom: 20 }}>Apply when building, testing, or extending the multilingual feature.</div>

            <div style={{ background: "#0C2340", borderRadius: 8, padding: "14px 18px", marginBottom: 20, display: "flex", gap: 20, flexWrap: "wrap", alignItems: "flex-start" }}>
              {[
                { label: "California H&S Code", value: "§1259",         sub: "Free qualified interpreter right" },
                { label: "Dymally-Alatorre",    value: "CA Govt §7290+", sub: "Translated materials ≥5% pop." },
                { label: "ACA Section",          value: "§1557",         sub: "Non-discrimination / language access" },
                { label: "Title 22 CCR",         value: "Written",       sub: "Instructions in patient's language" },
              ].map((s, i) => (
                <div key={i}>
                  <div style={{ fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: "#3A6A8A", marginBottom: 4 }}>{s.label}</div>
                  <div style={{ fontSize: 15, fontWeight: 700, color: "#1D9E75" }}>{s.value}</div>
                  <div style={{ fontSize: 10, color: "#4A7A9A", marginTop: 1 }}>{s.sub}</div>
                </div>
              ))}
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              {RULES.map((section, i) => (
                <div key={i} style={{ background: "#fff", border: "1px solid #E5E2DC", borderRadius: 8, overflow: "hidden" }}>
                  <div style={{ background: section.bg, padding: "10px 16px", borderBottom: `1px solid ${section.color}25` }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: section.color, letterSpacing: "0.05em", textTransform: "uppercase" }}>{section.title}</div>
                  </div>
                  <div style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 8 }}>
                    {section.items.map((item, j) => (
                      <div key={j} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                        <span style={{ width: 18, height: 18, borderRadius: "50%", background: section.bg, color: section.color, fontSize: 9, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 2 }}>{j+1}</span>
                        <span style={{ fontSize: 12, color: "#3A3A38", lineHeight: 1.65 }}>{item}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <div style={{ borderTop: "1px solid #E5E2DC", padding: "14px 28px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <span style={{ fontSize: 11, color: "#aaa" }}>8 languages · California Title 22 · Back-translation QA · HIPAA-compliant</span>
        <div style={{ display: "flex", gap: 6 }}>
          {[["system","System"],["translate","Translate"],["backxl","QA"],["code","API"]].map(([id, label]) => (
            <button key={id} onClick={() => copy(CONTENT[id] || INTEGRATION_CODE, `f-${id}`)} style={{
              background: copied === `f-${id}` ? "#1D9E75" : "transparent",
              color: copied === `f-${id}` ? "#fff" : "#999",
              border: "1px solid #ddd", padding: "4px 10px", borderRadius: 4,
              fontSize: 10, cursor: "pointer", fontFamily: "inherit",
              textTransform: "uppercase", letterSpacing: "0.05em", transition: "all .2s",
            }}>{copied === `f-${id}` ? "✓" : label}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MultilingualPromptSystem />);
</script>
</body>
</html>
