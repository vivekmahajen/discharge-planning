<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#00529B" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="DischargePlan" />
  <link rel="stylesheet" href="/static/mobile.css" />
<title>Sign In — Discharge Planning AI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f4f8;
    color: #1e293b;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
    padding: 40px 36px 32px;
    width: 100%;
    max-width: 400px;
  }

  .brand {
    text-align: center;
    margin-bottom: 28px;
  }

  .brand .icon { font-size: 2.8rem; line-height: 1; margin-bottom: 10px; display: block; }
  .brand h1 { font-size: 1.25rem; font-weight: 700; color: #1a56db; letter-spacing: -0.3px; margin-bottom: 4px; }
  .brand p { font-size: 0.78rem; color: #64748b; letter-spacing: 0.2px; }

  /* Mode tabs */
  .tabs {
    display: flex;
    border-bottom: 2px solid #e2e8f0;
    margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 10px 0;
    font-size: 0.88rem;
    font-weight: 600;
    font-family: inherit;
    color: #94a3b8;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn.active { color: #1a56db; border-bottom-color: #1a56db; }
  .tab-btn:hover:not(.active) { color: #475569; }

  .form-panel { display: none; }
  .form-panel.active { display: block; }

  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }

  label { font-size: 0.75rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.4px; }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    border: 1px solid #cbd5e1;
    border-radius: 7px;
    padding: 10px 13px;
    font-size: 0.92rem;
    font-family: inherit;
    color: #1e293b;
    background: #f8fafc;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }
  input:focus {
    outline: none;
    border-color: #1a56db;
    box-shadow: 0 0 0 3px rgba(26,86,219,0.12);
    background: #fff;
  }
  input.invalid { border-color: #dc2626; }

  .msg {
    display: none;
    border-radius: 7px;
    padding: 10px 13px;
    font-size: 0.84rem;
    margin-bottom: 16px;
  }
  .msg.error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
  .msg.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }

  .submit-btn {
    width: 100%;
    padding: 11px;
    background: #1a56db;
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 4px;
  }
  .submit-btn:hover:not(:disabled) { background: #1646b8; }
  .submit-btn:active:not(:disabled) { transform: scale(0.98); }
  .submit-btn:disabled { background: #93aee8; cursor: not-allowed; }

  .password-hint {
    font-size: 0.72rem;
    color: #94a3b8;
    margin-top: 3px;
  }

  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 0.72rem;
    color: #94a3b8;
    line-height: 1.5;
    max-width: 400px;
  }

  .sso-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0 16px;
  }
  .sso-divider hr { flex: 1; border: none; border-top: 1px solid #e2e8f0; }
  .sso-divider span { font-size: 0.75rem; color: #94a3b8; white-space: nowrap; }

  .sso-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 11px;
    background: #fff;
    color: #1e293b;
    border: 1.5px solid #cbd5e1;
    border-radius: 7px;
    font-size: 0.92rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .sso-btn:hover { border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,0.10); }
  .sso-btn svg { flex-shrink: 0; }
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <span class="icon">🏥</span>
    <h1>Discharge Planning AI</h1>
    <p>Clinical Decision Support System</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
  </div>

  <!-- Sign In panel -->
  <div class="form-panel active" id="panel-login">
    <div id="login-msg" class="msg error"></div>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="your@hospital.org" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="submit-btn" id="login-btn">Sign In</button>
    </form>
  </div>

  <!-- Sign Up panel -->
  <div class="form-panel" id="panel-signup">
    <div id="signup-msg" class="msg"></div>
    <form id="signup-form" novalidate>
      <div class="form-group">
        <label for="signup-email">Email Address</label>
        <input type="email" id="signup-email" placeholder="your@hospital.org" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" autocomplete="new-password" required />
        <span class="password-hint">Minimum 8 characters</span>
      </div>
      <div class="form-group">
        <label for="signup-confirm">Confirm Password</label>
        <input type="password" id="signup-confirm" autocomplete="new-password" required />
      </div>
      <button type="submit" class="submit-btn" id="signup-btn">Create Account</button>
    </form>
  </div>
</div>

<!-- SSO section — shown only when AUTH0_* env vars are configured -->
<div id="sso-section" class="card" style="display:none; margin-top: 12px; padding: 20px 36px;">
  <div class="sso-divider">
    <hr><span>or sign in with your organization</span><hr>
  </div>
  <a href="/auth/sso/login" class="sso-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
    </svg>
    Sign in with SSO
  </a>
</div>

<p class="footer">Authorized personnel only. All patient data is protected under HIPAA.</p>

<script>
fetch('/api/auth/sso/config')
  .then(r => r.json())
  .then(d => { if (d.enabled) document.getElementById('sso-section').style.display = 'block'; })
  .catch(() => {});
</script>
<script>
function switchTab(mode) {
  ['login','signup'].forEach(m => {
    document.getElementById('tab-' + m).classList.toggle('active', m === mode);
    document.getElementById('panel-' + m).classList.toggle('active', m === mode);
  });
  // Clear messages when switching
  ['login-msg','signup-msg'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = 'none';
    el.className = 'msg error';
  });
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  document.getElementById('login-msg').style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    let data = {};
    try { data = await res.json(); } catch(_) {}
    if (res.ok) {
      window.location.href = '/';
    } else {
      showMsg('login-msg', data.error || `Server error (${res.status}). Please try again.`, 'error');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch(err) {
    showMsg('login-msg', 'Could not reach the server. Please try again.', 'error');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});

document.getElementById('signup-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('signup-btn');
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;

  if (password.length < 8) {
    showMsg('signup-msg', 'Password must be at least 8 characters.', 'error');
    return;
  }
  if (password !== confirm) {
    showMsg('signup-msg', 'Passwords do not match.', 'error');
    document.getElementById('signup-confirm').classList.add('invalid');
    return;
  }
  document.getElementById('signup-confirm').classList.remove('invalid');

  btn.disabled = true;
  btn.textContent = 'Creating account...';
  document.getElementById('signup-msg').style.display = 'none';

  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    let data = {};
    try { data = await res.json(); } catch(_) {}
    if (res.ok) {
      window.location.href = '/';
    } else {
      showMsg('signup-msg', data.error || `Server error (${res.status}). Please try again.`, 'error');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  } catch(err) {
    showMsg('signup-msg', 'Could not reach the server. Please try again.', 'error');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
});
</script>

  <script src="/static/pwa.js" defer></script>
</body>
</html>
