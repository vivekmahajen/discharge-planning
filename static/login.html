<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In — Discharge Planning AI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f4f8;
    color: #1e293b;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10), 0 1px 4px rgba(0, 0, 0, 0.06);
    padding: 40px 36px 32px;
    width: 100%;
    max-width: 400px;
  }

  .brand {
    text-align: center;
    margin-bottom: 32px;
  }

  .brand .icon {
    font-size: 2.8rem;
    line-height: 1;
    margin-bottom: 10px;
    display: block;
  }

  .brand h1 {
    font-size: 1.25rem;
    font-weight: 700;
    color: #1a56db;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }

  .brand p {
    font-size: 0.78rem;
    color: #64748b;
    letter-spacing: 0.2px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 16px;
  }

  label {
    font-size: 0.75rem;
    font-weight: 600;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  input[type="email"],
  input[type="password"] {
    border: 1px solid #cbd5e1;
    border-radius: 7px;
    padding: 10px 13px;
    font-size: 0.92rem;
    font-family: inherit;
    color: #1e293b;
    background: #f8fafc;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }

  input[type="email"]:focus,
  input[type="password"]:focus {
    outline: none;
    border-color: #1a56db;
    box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.12);
    background: #fff;
  }

  #error-msg {
    display: none;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 7px;
    padding: 10px 13px;
    font-size: 0.84rem;
    color: #dc2626;
    margin-bottom: 16px;
  }

  #submit-btn {
    width: 100%;
    padding: 11px;
    background: #1a56db;
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 4px;
  }

  #submit-btn:hover:not(:disabled) {
    background: #1646b8;
  }

  #submit-btn:active:not(:disabled) {
    transform: scale(0.98);
  }

  #submit-btn:disabled {
    background: #93aee8;
    cursor: not-allowed;
  }

  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 0.72rem;
    color: #94a3b8;
    line-height: 1.5;
    max-width: 400px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <span class="icon">🏥</span>
    <h1>Discharge Planning AI</h1>
    <p>Clinical Decision Support System</p>
  </div>

  <div id="error-msg"></div>

  <form id="login-form" novalidate>
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="your@hospital.org" autocomplete="email" required />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />
    </div>
    <button type="submit" id="submit-btn">Sign In</button>
  </form>
</div>

<p class="footer">Authorized personnel only. All patient data is protected under HIPAA.</p>

<script>
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errDiv = document.getElementById('error-msg');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errDiv.style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/';
    } else {
      errDiv.textContent = data.error || 'Login failed.';
      errDiv.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch(err) {
    errDiv.textContent = 'Network error. Please try again.';
    errDiv.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}
document.getElementById('login-form').addEventListener('submit', handleLogin);
</script>

</body>
</html>
