<script type="text/babel">
const { useState } = React;

const SYSTEM_PROMPT = `You are an expert clinical documentation specialist embedded in a HIPAA-compliant hospital discharge planning system. Your role is to generate accurate, structured, CMS-compliant discharge summaries for use by licensed discharge planners, case managers, and attending physicians in California acute care hospitals.

You operate under these non-negotiable constraints:
- NEVER fabricate clinical data, medications, lab values, or diagnoses not present in the source notes
- NEVER include information that could identify a patient beyond what is explicitly provided
- ALWAYS flag missing critical information rather than inventing it
- ALWAYS use plain-language patient instructions alongside clinical terminology
- ALWAYS include California-specific regulatory elements: CDPH CoP compliance, Livanta QIO appeal rights, Medi-Cal auth status where applicable
- Output must be structured JSON matching the schema provided — no prose, no markdown fences, no preamble

Your output will be parsed programmatically and rendered into a printable, legally defensible discharge document. Accuracy and completeness take precedence over brevity.`;

const USER_PROMPT_TEMPLATE = `Generate a complete, CMS-compliant discharge summary from the clinical notes below.

## Patient Context
- Admission date: {{ADMISSION_DATE}}
- Discharge date: {{DISCHARGE_DATE}}
- Attending physician: {{ATTENDING}}
- Unit / service: {{UNIT}}
- Insurance / payer: {{PAYER}}
- Patient preferred language: {{LANGUAGE}}
- LACE risk score: {{LACE_SCORE}} ({{LACE_TIER}})
- HRRP flagged condition: {{HRRP_FLAG}}

## Source Clinical Notes
{{CLINICAL_NOTES}}

## Instructions
Return a single valid JSON object matching this exact schema. Do not wrap in markdown fences.

{
  "summary_metadata": {
    "generated_at": "<ISO timestamp>",
    "source_note_quality": "complete | partial | insufficient",
    "missing_fields": ["<field name if data was absent>"],
    "confidence": "high | medium | low",
    "requires_physician_review": true | false,
    "review_reason": "<reason if requires_physician_review is true, else null>"
  },
  "patient_summary": {
    "primary_diagnosis": "<ICD-10 code and plain-English name>",
    "secondary_diagnoses": ["<ICD-10 code — plain name>"],
    "admission_reason": "<1–2 sentence plain English>",
    "hospital_course": "<3–5 sentence narrative of what happened during the stay>",
    "procedures_performed": ["<procedure name and date>"],
    "condition_at_discharge": "stable | improved | unchanged | declined",
    "functional_status": "<ADL/mobility status at discharge>"
  },
  "medications": {
    "discharge_medications": [
      {
        "name": "<generic name (brand name)>",
        "dose": "<dose and units>",
        "route": "<oral/IV/topical/etc>",
        "frequency": "<frequency in plain English>",
        "duration": "<number of days or ongoing>",
        "indication": "<plain-English reason>",
        "new_or_changed": true,
        "patient_instruction": "<one sentence a patient can understand>"
      }
    ],
    "medications_stopped": [
      {
        "name": "<medication name>",
        "reason_stopped": "<plain English reason>"
      }
    ],
    "reconciliation_complete": true,
    "high_alert_medications": ["<medication name if warfarin, insulin, opioids, anticoagulants>"],
    "reconciliation_notes": "<any discrepancies or pharmacist flags>"
  },
  "follow_up": {
    "appointments": [
      {
        "provider": "<name or specialty>",
        "timeframe": "<within X days>",
        "reason": "<plain English>",
        "scheduled": true,
        "scheduling_instructions": "<what patient needs to do if not yet scheduled>"
      }
    ],
    "labs_pending": ["<lab name and expected turnaround>"],
    "imaging_pending": ["<imaging name and expected turnaround>"],
    "primary_care_notified": true
  },
  "patient_education": {
    "diagnosis_explanation": "<2–3 sentences a 6th-grade reader can understand>",
    "warning_signs": [
      {
        "sign": "<symptom or sign>",
        "action": "<what patient should do: call doctor / go to ER / call 911>"
      }
    ],
    "activity_restrictions": "<what patient can and cannot do>",
    "diet_instructions": "<dietary guidance in plain language>",
    "wound_care": "<wound care instructions or null if not applicable>",
    "teach_back_topics": ["<topic the planner must verify patient understands before discharge>"]
  },
  "post_acute_plan": {
    "discharge_destination": "home | SNF | IRF | LTACH | hospice | assisted living | other",
    "home_health_ordered": true,
    "home_health_services": ["<nursing/PT/OT/SLP/aide>"],
    "dme_ordered": ["<equipment name>"],
    "snf_name": "<facility name or null>",
    "snf_cms_stars": "<1–5 or null>",
    "three_day_rule_met": true,
    "patient_choice_documented": true
  },
  "california_compliance": {
    "cdph_cop_checklist_complete": true,
    "imm_delivered": true,
    "imm_delivery_timestamp": "<ISO timestamp or null>",
    "livanta_qio_rights_provided": true,
    "appeal_deadline": "<date 24h after IMM delivery>",
    "medi_cal_auth_status": "approved | pending | not_required | not_initiated",
    "medi_cal_plan": "<plan name or null>",
    "ab_1195_rights_provided": true,
    "hrrp_condition_flagged": true,
    "hrrp_condition": "<condition name or null>",
    "team_model_bundle_applicable": true,
    "estimated_hrrp_exposure": "<dollar amount or null>"
  },
  "liability_documentation": {
    "discharge_against_advice": false,
    "patient_refused_services": [],
    "family_concerns_documented": "<summary of any concerns raised or null>",
    "unsafe_discharge_complaint": false,
    "planner_attestation_required": true,
    "attestation_statement": "I certify that this discharge plan was developed in collaboration with the patient and/or their authorized representative, that the patient preferences were considered, and that post-acute care options were presented in compliance with CMS CoP 42 CFR 482.43 and California CDPH discharge planning requirements."
  },
  "readmission_risk": {
    "lace_score": 0,
    "risk_tier": "low",
    "primary_risk_factors": ["<identified risk factor>"],
    "mitigation_interventions": ["<specific intervention ordered>"],
    "follow_up_call_cadence": "24h only | 24h + 72h | 24h + 72h + 7d + 14d",
    "transitional_care_management_applicable": true
  }
}`;

const EXAMPLE_OUTPUT = `{
  "summary_metadata": {
    "generated_at": "2026-05-18T14:32:00Z",
    "source_note_quality": "partial",
    "missing_fields": ["imaging_pending", "wound_care"],
    "confidence": "high",
    "requires_physician_review": true,
    "review_reason": "Patient discharged on warfarin"
  },
  "patient_summary": {
    "primary_diagnosis": "I50.9 — Heart failure, unspecified",
    "secondary_diagnoses": ["E11.9 — Type 2 diabetes", "I10 — Essential hypertension"],
    "admission_reason": "Patient admitted with worsening shortness of breath and leg swelling for 3 days.",
    "hospital_course": "Patient admitted in acute decompensated heart failure. Treated with IV furosemide with significant diuresis. Echo showed EF 35%. Cardiology consulted. Discharged after achieving dry weight with oral diuretics.",
    "condition_at_discharge": "improved",
    "functional_status": "Ambulating independently with mild exertional dyspnea"
  },
  "california_compliance": {
    "cdph_cop_checklist_complete": false,
    "imm_delivered": "pending",
    "livanta_qio_rights_provided": false,
    "medi_cal_auth_status": "pending",
    "medi_cal_plan": "Anthem Blue Cross Medi-Cal",
    "hrrp_condition_flagged": true,
    "hrrp_condition": "Heart Failure",
    "estimated_hrrp_exposure": "$3,025 per excess readmission day"
  }
}`;

const INTEGRATION_CODE = `// api/generate-discharge-summary.js
// Next.js API route — adapts to any Node framework

export async function POST(req) {
  const { clinicalNotes, patientContext } = await req.json();

  const userPrompt = USER_PROMPT_TEMPLATE
    .replace('{{ADMISSION_DATE}}', patientContext.admissionDate)
    .replace('{{DISCHARGE_DATE}}', patientContext.dischargeDate)
    .replace('{{ATTENDING}}', patientContext.attending)
    .replace('{{UNIT}}', patientContext.unit)
    .replace('{{PAYER}}', patientContext.payer)
    .replace('{{LANGUAGE}}', patientContext.language || 'English')
    .replace('{{LACE_SCORE}}', patientContext.laceScore ?? 'Not calculated')
    .replace('{{LACE_TIER}}', patientContext.laceTier ?? 'Unknown')
    .replace('{{HRRP_FLAG}}', patientContext.hrrpFlag ?? 'None')
    .replace('{{CLINICAL_NOTES}}', clinicalNotes);

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': process.env.ANTHROPIC_API_KEY, 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      temperature: 0,
      system: SYSTEM_PROMPT,
      messages: [{ role: 'user', content: userPrompt }]
    })
  });

  const data = await response.json();
  const rawText = data.content[0].text;
  const clean = rawText.replace(/^\`\`\`json\\n?/, '').replace(/\\n?\`\`\`$/, '').trim();

  try {
    const summary = JSON.parse(clean);
    if (summary.california_compliance.hrrp_condition_flagged) {
      summary.readmission_risk.follow_up_call_cadence = '24h + 72h + 7d + 14d';
    }
    return Response.json({ success: true, summary });
  } catch (err) {
    return Response.json({ success: false, error: 'Parse failed', raw: rawText }, { status: 500 });
  }
}`;

const TRANSLATION_PROMPT = `You are a certified medical interpreter. Translate the following discharge instructions into {{TARGET_LANGUAGE}}.

Rules:
- Use plain language equivalent to a 6th-grade reading level in {{TARGET_LANGUAGE}}
- Do NOT translate medication names — keep brand and generic names in English
- Do NOT translate dosing numbers — keep "10mg twice daily" as-is
- DO translate instructions, explanations, and warning signs fully
- Preserve all numbered lists and structure from the original
- If a medical term has no direct equivalent, use the closest plain-language description and add a brief explanation in parentheses
- Mark any phrase you are uncertain about with [REVIEW NEEDED]

Source instructions (English):
{{ENGLISH_INSTRUCTIONS}}

Return the translated text only — no preamble, no explanation.`;

const tabs = [
  { id: "system", label: "System prompt" },
  { id: "user", label: "User prompt template" },
  { id: "output", label: "Output schema" },
  { id: "integration", label: "Integration code" },
  { id: "translation", label: "Translation prompt" },
  { id: "rules", label: "Prompt rules" },
  { id: "try", label: "▶ Try it" },
];

const promptContent = {
  system: SYSTEM_PROMPT,
  user: USER_PROMPT_TEMPLATE,
  output: EXAMPLE_OUTPUT,
  integration: INTEGRATION_CODE,
  translation: TRANSLATION_PROMPT,
};

const rules = [
  {
    category: "Accuracy & Safety",
    color: "#C04028",
    bg: "#FAECE7",
    items: [
      "Never fabricate clinical data — if a field is missing, set to null and flag in missing_fields",
      "Flag high-alert medications (warfarin, insulin, opioids, anticoagulants) for mandatory physician review",
      "Confidence field must reflect actual note quality — partial notes = medium or low confidence",
      "Teach-back topics must always include: medication names/purpose + when to call doctor + follow-up appointment",
      "Warning signs must always include fever, worsening pain, infection signs, and diagnosis-specific symptoms",
    ],
  },
  {
    category: "California Compliance",
    color: "#0C447C",
    bg: "#E6F1FB",
    items: [
      "Always populate california_compliance block — never omit even if values are pending/false",
      "If payer is any Medi-Cal managed care plan, default medi_cal_auth_status to 'pending' unless notes confirm approval",
      "IMM delivery must be tracked with timestamp — set to 'pending' if not yet delivered at time of generation",
      "appeal_deadline = 24 hours after IMM delivery timestamp",
      "HRRP conditions to flag: AMI, Heart Failure, COPD, Pneumonia, Hip/Knee Arthroplasty, CABG",
      "TEAM model applies to surgical bundled episodes — set team_model_bundle_applicable true for joint/CABG/cardiac",
    ],
  },
  {
    category: "Readability",
    color: "#0F6E56",
    bg: "#E1F5EE",
    items: [
      "All patient_instruction fields must target 6th-grade reading level",
      "diagnosis_explanation must avoid jargon — 'your heart is not pumping as well as it should' not 'reduced ejection fraction'",
      "warning_signs must pair each sign with a specific action (call doctor / go to ER / call 911)",
      "activity_restrictions must be concrete: 'No lifting more than 10 lbs for 2 weeks' not 'limit activity'",
    ],
  },
  {
    category: "Output Reliability",
    color: "#5F3F8A",
    bg: "#EEEDFE",
    items: [
      "Always request JSON — strip markdown fences defensively in your API route",
      "Set max_tokens to 4000 minimum — complex summaries with many medications can exceed 2000 tokens",
      "Use temperature 0 for consistency — discharge summaries must be reproducible, not creative",
      "If source_note_quality is 'insufficient', surface a planner alert before displaying the summary",
      "Post-process server-side: enforce LACE-to-cadence mapping and HRRP flagging in code, not just in Claude",
    ],
  },
  {
    category: "Translation",
    color: "#6B4A10",
    bg: "#FAEEDA",
    items: [
      "Run translation as a second Claude call — do not bundle with summary generation",
      "Keep medication names and doses in English in all languages — translation of drug names causes dosing errors",
      "Mark uncertain translations with [REVIEW NEEDED] — build a UI flag for clinical review",
      "Sacramento County priority languages: Spanish, Vietnamese, Hmong, Russian, Tagalog, Chinese (Cantonese/Mandarin)",
      "Never translate the attestation statement — liability language must remain in English",
    ],
  },
];

function DischargeSummaryPrompt() {
  const [activeTab, setActiveTab] = useState("system");
  const [copied, setCopied] = useState(null);

  const [tryNotes, setTryNotes] = useState("");
  const [tryContext, setTryContext] = useState({
    admissionDate: "", dischargeDate: "", attending: "", unit: "",
    payer: "", language: "English", laceScore: "", laceTier: "", hrrpFlag: ""
  });
  const [tryLoading, setTryLoading] = useState(false);
  const [tryResult, setTryResult] = useState(null);
  const [tryError, setTryError] = useState(null);

  const copy = (text, id) => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(id);
      setTimeout(() => setCopied(null), 2000);
    });
  };

  const handleTry = async () => {
    if (!tryNotes.trim()) { setTryError("Please enter clinical notes."); return; }
    setTryLoading(true); setTryResult(null); setTryError(null);
    try {
      const res = await fetch('/api/summary/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ clinicalNotes: tryNotes, patientContext: tryContext })
      });
      let data = {};
      try { data = await res.json(); } catch(_) {}
      if (res.ok && data.success) {
        setTryResult(data.summary);
      } else {
        setTryError(data.error || `Server error ${res.status}`);
      }
    } catch(e) {
      setTryError("Could not reach the server. Please try again.");
    }
    setTryLoading(false);
  };

  const inputStyle = {
    width: '100%', padding: '8px 10px', border: '1px solid #ddd',
    borderRadius: 5, fontFamily: 'inherit', fontSize: 12, background: '#fafaf8',
    color: '#1A1917', boxSizing: 'border-box'
  };

  const promptTabIds = ["system","user","output","integration","translation"];

  return (
    <div style={{ fontFamily: "'Georgia', serif", background: "#FAFAF8", minHeight: "100vh", color: "#1A1917" }}>

      {/* Tab bar */}
      <div style={{ background: "#111", display: "flex", gap: 0, overflowX: "auto", borderBottom: "1px solid #2A2A28" }}>
        {tabs.map(t => (
          <button
            key={t.id}
            onClick={() => setActiveTab(t.id)}
            style={{
              background: activeTab === t.id ? "#1A1917" : "transparent",
              border: "none",
              borderBottom: activeTab === t.id ? "2px solid #C04028" : "2px solid transparent",
              color: activeTab === t.id ? "#F5F3EF" : "#666",
              padding: "11px 18px", fontSize: 12, cursor: "pointer", fontFamily: "inherit",
              whiteSpace: "nowrap", letterSpacing: "0.02em", transition: "all .15s",
            }}
          >{t.label}</button>
        ))}
      </div>

      <div style={{ padding: "24px 28px", maxWidth: 900 }}>

        {/* Prompt display tabs */}
        {promptTabIds.includes(activeTab) && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#1A1917", marginBottom: 3 }}>
                  {activeTab === "system" ? "System prompt — passes with every API call" :
                   activeTab === "user" ? "User prompt template — populated per patient" :
                   activeTab === "output" ? "Example output — abbreviated CHF patient" :
                   activeTab === "integration" ? "Next.js API route — full integration" :
                   "Translation prompt — second Claude call"}
                </div>
                <div style={{ fontSize: 12, color: "#888", lineHeight: 1.5 }}>
                  {activeTab === "system" ? "Sets the model's role, constraints, and non-negotiables. Do not modify between calls." :
                   activeTab === "user" ? "Inject patient context via template variables before each API call. Never hardcode." :
                   activeTab === "output" ? "Validates your parser against a known-good response. Schema fields are non-optional." :
                   activeTab === "integration" ? "Production-ready API route with JSON parsing and CA rule enforcement." :
                   "Run after summary generation. Separate call with temperature 0 and medical interpreter persona."}
                </div>
              </div>
              <button
                onClick={() => copy(promptContent[activeTab], activeTab)}
                style={{
                  background: copied === activeTab ? "#1D9E75" : "#C04028",
                  color: "#fff", border: "none", padding: "7px 16px", borderRadius: 4,
                  fontSize: 11, cursor: "pointer", fontFamily: "inherit",
                  letterSpacing: "0.04em", flexShrink: 0, marginLeft: 12, transition: "background .2s"
                }}
              >{copied === activeTab ? "✓ Copied" : "Copy prompt"}</button>
            </div>

            {activeTab === "user" && (
              <div style={{ background: "#FAEEDA", border: "1px solid #F0C060", borderRadius: 6, padding: "10px 14px", marginBottom: 14, fontSize: 12, color: "#6B4A10", lineHeight: 1.6 }}>
                <strong>Template variables: </strong>Replace all <code style={{ background: "rgba(0,0,0,0.08)", padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>{"{{VARIABLE}}"}</code> tokens with patient-specific values before sending. Never let template tokens reach Claude.
              </div>
            )}

            {activeTab === "integration" && (
              <div style={{ background: "#E1F5EE", border: "1px solid #9FE1CB", borderRadius: 6, padding: "10px 14px", marginBottom: 14, fontSize: 12, color: "#0F6E56", lineHeight: 1.6 }}>
                <strong>Before deploying: </strong>Ensure ANTHROPIC_API_KEY is in server environment variables (not exposed to client). Sign BAA with Anthropic before storing any real PHI.
              </div>
            )}

            <div style={{ background: "#111", borderRadius: 8, border: "1px solid #2A2A28", overflow: "hidden" }}>
              <div style={{ background: "#1A1917", padding: "8px 16px", display: "flex", gap: 6, alignItems: "center", borderBottom: "1px solid #2A2A28" }}>
                <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#C04028", display: "inline-block" }} />
                <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#BA7517", display: "inline-block" }} />
                <span style={{ width: 10, height: 10, borderRadius: "50%", background: "#1D9E75", display: "inline-block" }} />
                <span style={{ fontSize: 11, color: "#555", marginLeft: 8 }}>
                  {activeTab === "system" ? "system_prompt.txt" :
                   activeTab === "user" ? "user_prompt_template.txt" :
                   activeTab === "output" ? "example_output.json" :
                   activeTab === "integration" ? "api/generate-discharge-summary.js" :
                   "translation_prompt.txt"}
                </span>
              </div>
              <pre style={{ margin: 0, padding: "20px", color: "#C8C4BC", fontFamily: "'Menlo','Monaco','Courier New',monospace", fontSize: 11.5, lineHeight: 1.75, overflow: "auto", maxHeight: 520, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>
                {promptContent[activeTab]}
              </pre>
            </div>

            <div style={{ marginTop: 10, display: "flex", gap: 16, flexWrap: "wrap" }}>
              {activeTab === "system" && <>
                <span style={{ fontSize: 11, color: "#888" }}>~{Math.round(SYSTEM_PROMPT.length / 4)} tokens</span>
                <span style={{ fontSize: 11, color: "#888" }}>Sent with every call · Do not vary</span>
              </>}
              {activeTab === "user" && <>
                <span style={{ fontSize: 11, color: "#888" }}>~{Math.round(USER_PROMPT_TEMPLATE.length / 4)} tokens base + clinical notes</span>
                <span style={{ fontSize: 11, color: "#888" }}>Set max_tokens: 4000 · temperature: 0</span>
              </>}
              {activeTab === "integration" && <>
                <span style={{ fontSize: 11, color: "#888" }}>Model: claude-sonnet-4-20250514</span>
                <span style={{ fontSize: 11, color: "#888" }}>max_tokens: 4000 · temperature: 0</span>
              </>}
              {activeTab === "translation" && <>
                <span style={{ fontSize: 11, color: "#888" }}>Separate API call · max_tokens: 2000</span>
                <span style={{ fontSize: 11, color: "#888" }}>temperature: 0 · Do NOT bundle with summary</span>
              </>}
            </div>
          </div>
        )}

        {/* Rules tab */}
        {activeTab === "rules" && (
          <div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#1A1917", marginBottom: 4 }}>Prompt engineering rules</div>
            <div style={{ fontSize: 12, color: "#888", marginBottom: 20 }}>Apply these when modifying, extending, or debugging the prompt system.</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {rules.map((section, i) => (
                <div key={i} style={{ background: "#fff", border: "1px solid #E8E6E0", borderRadius: 8, overflow: "hidden" }}>
                  <div style={{ background: section.bg, padding: "10px 16px", borderBottom: "1px solid " + section.color + "22" }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: section.color, letterSpacing: "0.04em", textTransform: "uppercase" }}>{section.category}</div>
                  </div>
                  <div style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 8 }}>
                    {section.items.map((item, j) => (
                      <div key={j} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                        <span style={{ width: 18, height: 18, borderRadius: "50%", background: section.bg, color: section.color, fontSize: 10, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1 }}>{j + 1}</span>
                        <span style={{ fontSize: 12, color: "#444", lineHeight: 1.6 }}>{item}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Try it tab */}
        {activeTab === "try" && (
          <div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#1A1917", marginBottom: 4 }}>Try it — generate a discharge summary</div>
            <div style={{ fontSize: 12, color: "#888", marginBottom: 20 }}>Paste clinical notes and fill in patient context. The system will call the DischargeIQ API and return a structured JSON summary.</div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
              {[
                ["admissionDate","Admission Date","date"],["dischargeDate","Discharge Date","date"],
                ["attending","Attending Physician","text"],["unit","Unit / Service","text"],
                ["payer","Insurance / Payer","text"],["language","Patient Language","text"],
                ["laceScore","LACE Score","text"],["laceTier","LACE Tier (low/moderate/high)","text"],
                ["hrrpFlag","HRRP Condition (or None)","text"]
              ].map(([key, label, type]) => (
                <div key={key}>
                  <label style={{ fontSize: 11, fontWeight: 600, color: "#555", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>{label}</label>
                  <input
                    type={type}
                    value={tryContext[key] || ""}
                    onChange={e => setTryContext(prev => ({...prev, [key]: e.target.value}))}
                    style={inputStyle}
                  />
                </div>
              ))}
            </div>

            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 11, fontWeight: 600, color: "#555", display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>Clinical Notes *</label>
              <textarea
                value={tryNotes}
                onChange={e => setTryNotes(e.target.value)}
                rows={10}
                placeholder="Paste H&P, progress notes, or discharge note here..."
                style={{ ...inputStyle, resize: "vertical", lineHeight: 1.6 }}
              />
            </div>

            {tryError && (
              <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 6, padding: "10px 14px", marginBottom: 14, fontSize: 12, color: "#dc2626" }}>
                {tryError}
              </div>
            )}

            <button
              onClick={handleTry}
              disabled={tryLoading}
              style={{
                background: tryLoading ? "#93aee8" : "#C04028", color: "#fff", border: "none",
                padding: "11px 28px", borderRadius: 5, fontSize: 13, fontWeight: 700,
                fontFamily: "inherit", cursor: tryLoading ? "not-allowed" : "pointer",
                letterSpacing: "0.02em", marginBottom: 24
              }}
            >{tryLoading ? "Generating..." : "Generate Discharge Summary"}</button>

            {tryResult && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#1A1917" }}>Generated Summary</div>
                  <button
                    onClick={() => copy(JSON.stringify(tryResult, null, 2), "try-result")}
                    style={{ background: copied === "try-result" ? "#1D9E75" : "#1A1917", color: "#fff", border: "none", padding: "6px 14px", borderRadius: 4, fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}
                  >{copied === "try-result" ? "✓ Copied" : "Copy JSON"}</button>
                </div>
                {tryResult.summary_metadata?.requires_physician_review && (
                  <div style={{ background: "#FAECE7", border: "1px solid #C04028", borderRadius: 6, padding: "10px 14px", marginBottom: 12, fontSize: 12, color: "#C04028", fontWeight: 600 }}>
                    ⚠️ Physician review required: {tryResult.summary_metadata.review_reason}
                  </div>
                )}
                <pre style={{ background: "#111", color: "#C8C4BC", padding: 20, borderRadius: 8, fontSize: 11.5, lineHeight: 1.75, overflow: "auto", maxHeight: 600, whiteSpace: "pre-wrap", wordBreak: "break-word", margin: 0 }}>
                  {JSON.stringify(tryResult, null, 2)}
                </pre>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{ borderTop: "1px solid #E8E6E0", padding: "16px 28px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <span style={{ fontSize: 11, color: "#aaa" }}>Discharge Planning AI · California-compliant · HIPAA-safe architecture</span>
        <div style={{ display: "flex", gap: 8 }}>
          {["system","user","integration"].map(id => (
            <button
              key={id}
              onClick={() => copy(promptContent[id], "footer-" + id)}
              style={{
                background: copied === "footer-" + id ? "#1D9E75" : "#1A1917",
                color: copied === "footer-" + id ? "#fff" : "#aaa",
                border: "1px solid #333", padding: "5px 12px", borderRadius: 4,
                fontSize: 10, cursor: "pointer", fontFamily: "inherit",
                letterSpacing: "0.05em", textTransform: "uppercase", transition: "all .2s"
              }}
            >{copied === "footer-" + id ? "✓" : "Copy " + id}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DischargeSummaryPrompt />);
</script>
</body>
</html>
