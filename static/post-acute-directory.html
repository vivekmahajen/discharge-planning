/* ─── Haversine distance (miles) ─────────────────────────────────────────── */
function miles(lat1, lon1, lat2, lon2) {
  const R = 3959, d = (a, b) => (b - a) * Math.PI / 180;
  const a = Math.sin(d(lat1, lat2) / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(d(lon1, lon2) / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

/* ─── Star rating display ─────────────────────────────────────────────────── */
function Stars({ n, size = 13 }) {
  if (!n) return <span style={{ fontSize: 11, color: "var(--color-text-secondary)" }}>N/A</span>;
  return (
    <span style={{ display: "inline-flex", gap: 1 }} aria-label={`${n} out of 5 stars`}>
      {[1,2,3,4,5].map(i => (
        <svg key={i} width={size} height={size} viewBox="0 0 20 20" aria-hidden="true">
          <polygon points="10,1 12.9,7 20,7.6 14.5,12.5 16.6,19.5 10,16 3.4,19.5 5.5,12.5 0,7.6 7.1,7"
            fill={i <= n ? "#C8920A" : "var(--color-border-secondary)"} />
        </svg>
      ))}
    </span>
  );
}

/* ─── Payer badge ─────────────────────────────────────────────────────────── */
function PayerBadge({ label, color, bg }) {

    <span style={{ fontSize: 10, fontWeight: 500, padding: "2px 7px", borderRadius: 3,
      background: bg, color, letterSpacing: "0.04em" }}>{label}</span>
  );
}

                border: "0.5px solid var(--color-border-secondary)", textDecoration: "none",
                display: "inline-flex", alignItems: "center", gap: 3 }}>
              <i className="ti ti-external-link" aria-hidden="true" style={{ fontSize: 12 }}></i> CMS
            </a>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   MAIN COMPONENT
════════════════════════════════════════════════════════════════════════════ */
function PostAcuteDirectory() {
  const [facilities, setFacilities] = useState(SEED_FACILITIES);
  const [loading,    setLoading]    = useState(false);
  const [cmsStatus,  setCmsStatus]  = useState("seed");
  const [selected,   setSelected]   = useState([]);
  const [search,     setSearch]     = useState("");
  const [filters,    setFilters]    = useState({
    type: "all", county: "all", minStars: 0, medicare: false,
    medi_cal: false, maxDist: 50, sortBy: "distance",
  });

  const setF = (k, v) => setFilters(p => ({ ...p, [k]: v }));

  /* ── Live CMS fetch ─────────────────────────────────────────────────────── */
  const fetchCMS = useCallback(async () => {
    setLoading(true); setCmsStatus("loading");
    try {
      const snfParams = new URLSearchParams({ "filter[PROVSTATE]": "CA", limit: "1000", offset: "0" });
      const snfRes = await fetch(`${CMS_SNF}?${snfParams}`, { signal: AbortSignal.timeout(12000) });
      if (!snfRes.ok) throw new Error(`HTTP ${snfRes.status}`);
      const snfData = await snfRes.json();

      const mapped = (Array.isArray(snfData) ? snfData : snfData.data || [])
        .filter(r => {
          const c = (r.CITY || r.city || "").toUpperCase().trim();
          return SAC_CITIES.has(c) || ELD_CITIES.has(c);
        })
        .map((r, i) => {
          const city   = (r.CITY || r.city || "").toUpperCase().trim();
          const coords = getCoords(city);
          const lat    = parseFloat(r.LAT  || r.lat  || coords?.[0] || 38.5816);
          const lon    = parseFloat(r.LON  || r.lon  || coords?.[1] || -121.4944);
          const dist   = parseFloat(miles(REF.lat, REF.lon, lat, lon).toFixed(1));
          return {
            id: "cms_" + (r.PROVNUM || r.provnum || i),
            type: "SNF", source: "CMS",
            name:     r.PROVNAME || r.provname || "Unknown",
            city:     r.CITY    || r.city    || "",
            county:   SAC_CITIES.has(city) ? "Sacramento" : "El Dorado",
            address:  r.ADDRESS || r.address || "",
            zip:      r.ZIP     || r.zip     || "",
            phone:    r.PHONE   || r.phone   || "",
            beds:     parseInt(r.BEDCNT || r.bedcnt || 0) || null,
            stars:    parseInt(r.OVERALL_RATING           || r.overall_rating           || 0) || null,
            health:   parseInt(r.HEALTH_INSPECTION_RATING || r.health_inspection_rating || 0) || null,
            staffing: parseInt(r.STAFFING_RATING          || r.staffing_rating          || 0) || null,
            quality:  parseInt(r.QUALITY_MEASURE_RATING   || r.quality_measure_rating   || 0) || null,
            medicare: true, medi_cal: true,
            managed_care: ["Anthem","Health Net","Molina"],
            lat, lon, distance: dist,
            provnum:     r.PROVNUM || r.provnum || "",
            last_survey: r.CYCLE_1_SURVEY_DATE || r.cycle_1_survey_date || "",
          };
        });

      if (mapped.length > 0) {
        setFacilities([...SEED_FACILITIES, ...mapped.filter(m => !SEED_FACILITIES.some(s => s.name === m.name))]);
        setCmsStatus("live");
      } else {
        setCmsStatus("error");
      }
    } catch (e) {
      setCmsStatus("error");
    } finally {
      setLoading(false);
    }
  }, []);

  /* ── Filtered + sorted list ─────────────────────────────────────────────── */
  const results = useMemo(() => {
    return facilities
      .filter(f => {
        if (filters.type !== "all" && f.type !== filters.type) return false;
        if (filters.county !== "all" && f.county !== filters.county) return false;
        if (f.stars && f.stars < filters.minStars) return false;
        if (filters.medicare && !f.medicare) return false;
        if (filters.medi_cal && !f.medi_cal) return false;
        if (f.distance > filters.maxDist) return false;
        if (search && !f.name.toLowerCase().includes(search.toLowerCase()) &&
            !f.city.toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      })
      .sort((a, b) => {
        if (filters.sortBy === "distance") return a.distance - b.distance;
        if (filters.sortBy === "stars")    return (b.stars || 0) - (a.stars || 0);
        if (filters.sortBy === "name")     return a.name.localeCompare(b.name);
        if (filters.sortBy === "beds")     return (b.beds || 0) - (a.beds || 0);
        return 0;
      });
  }, [facilities, filters, search]);

  const snfCount = results.filter(f => f.type === "SNF").length;
  const hhaCount = results.filter(f => f.type === "HHA").length;
  const avgStars = results.length ? (results.reduce((s, f) => s + (f.stars || 0), 0) / results.length).toFixed(1) : "—";
  const highQual = results.filter(f => (f.stars || 0) >= 4).length;

  const toggleSelect = (f) => {
    setSelected(p => p.some(s => s.id === f.id) ? p.filter(s => s.id !== f.id) : [...p, f]);
  };

  return (
    <div style={{ fontFamily: "var(--font-sans)", color: "var(--color-text-primary)" }}>

      {/* ── Header card ── */}
      <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", padding: "14px 16px", marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
          <div>
            <div style={{ fontSize: 15, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 3 }}>
              <i className="ti ti-building-hospital" aria-hidden="true" style={{ fontSize: 18, marginRight: 8, verticalAlign: -3, color: "#185FA5" }}></i>
              California Post-Acute Facility Directory
            </div>
            <div style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>
              Sacramento &amp; El Dorado County · SNFs + Home Health · CMS Care Compare data · Distance from {REF.label}
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <span style={{ fontSize: 10, fontWeight: 500, padding: "2px 8px", borderRadius: 3,
              background: cmsStatus==="live" ? "var(--color-background-success)" : cmsStatus==="loading" ? "var(--color-background-warning)" : cmsStatus==="error" ? "var(--color-background-danger)" : "var(--color-background-secondary)",
              color:      cmsStatus==="live" ? "var(--color-text-success)"       : cmsStatus==="loading" ? "var(--color-text-warning)"       : cmsStatus==="error" ? "var(--color-text-danger)"       : "var(--color-text-secondary)" }}>
              {cmsStatus==="live" ? "Live CMS data" : cmsStatus==="loading" ? "Syncing CMS…" : cmsStatus==="error" ? "CMS unavailable" : "Sample data"}
            </span>
            <button onClick={fetchCMS} disabled={loading} style={{
              fontSize: 12, padding: "6px 14px", borderRadius: "var(--border-radius-md)",
              background: "var(--color-background-info)", color: "var(--color-text-info)",
              border: "0.5px solid var(--color-border-info)", cursor: loading ? "not-allowed" : "pointer",
              display: "flex", alignItems: "center", gap: 5, fontFamily: "var(--font-sans)",
            }}>
              <i className={`ti ti-${loading ? "loader" : "refresh"}`} aria-hidden="true"
                 style={{ fontSize: 13, animation: loading ? "spin 1s linear infinite" : "none" }}></i>
              {loading ? "Syncing…" : "Sync from CMS"}
            </button>
          </div>
        </div>

        {/* Stats row */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(100px,1fr))", gap: 10, marginTop: 12 }}>
          {[
            ["SNFs",       snfCount,        "#0C447C"],
            ["Home health",hhaCount,        "#3C3489"],
            ["Avg stars",  avgStars,        "#854F0B"],
            ["4–5 star",   highQual,        "#0F6E56"],
            ["Selected",   selected.length, "#1D9E75"],
          ].map(([l, v, c]) => (
            <div key={l} style={{ background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)", padding: "8px 10px" }}>
              <div style={{ fontSize: 20, fontWeight: 500, color: c, fontVariantNumeric: "tabular-nums" }}>{v}</div>
              <div style={{ fontSize: 10, color: "var(--color-text-secondary)", textTransform: "uppercase", letterSpacing: "0.07em", marginTop: 1 }}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── Selected bar ── */}
      {selected.length > 0 && (
        <div style={{ background: "var(--color-background-success)", border: "0.5px solid var(--color-border-success)", borderRadius: "var(--border-radius-lg)", padding: "10px 14px", marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
          <div style={{ fontSize: 12, color: "var(--color-text-success)", fontWeight: 500 }}>
            {selected.length} {selected.length === 1 ? "facility" : "facilities"} selected for discharge referral: {selected.map(s => s.name).join(", ")}
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={() => alert(`Referral packet initiated for:\n${selected.map(s => `• ${s.name} — ${s.phone}`).join("\n")}`)} style={{
              fontSize: 11, padding: "5px 12px", background: "#1D9E75", color: "#fff",
              border: "none", borderRadius: "var(--border-radius-md)", cursor: "pointer", fontFamily: "var(--font-sans)",
            }}>Send referral packet</button>
            <button onClick={() => setSelected([])} style={{
              fontSize: 11, padding: "5px 10px", background: "transparent", color: "var(--color-text-success)",
              border: "0.5px solid var(--color-border-success)", borderRadius: "var(--border-radius-md)", cursor: "pointer", fontFamily: "var(--font-sans)",
            }}>Clear</button>
          </div>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "220px 1fr", gap: 14 }}>

        {/* ── Filter panel ── */}
        <div>
          <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", padding: "14px" }}>
            <div style={{ fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              Filters
              <button onClick={() => setFilters({ type:"all", county:"all", minStars:0, medicare:false, medi_cal:false, maxDist:50, sortBy:"distance" })}
                style={{ fontSize: 10, color: "var(--color-text-secondary)", background: "transparent", border: "none", cursor: "pointer", padding: 0, fontFamily: "var(--font-sans)" }}>Reset</button>
            </div>

            {/* Search */}
            <div style={{ marginBottom: 12 }}>
              <label style={{ fontSize: 10, fontWeight: 500, color: "var(--color-text-secondary)", textTransform: "uppercase", letterSpacing: "0.08em", display: "block", marginBottom: 4 }}>Search</label>
              <div style={{ position: "relative" }}>
                <i className="ti ti-search" aria-hidden="true" style={{ position: "absolute", left: 8, top: "50%", transform: "translateY(-50%)", fontSize: 14, color: "var(--color-text-secondary)", pointerEvents: "none" }}></i>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Name or city…"
                  style={{ paddingLeft: 28 }} />
              </div>
            </div>

            {[
              { label: "Facility type", key: "type",   options: [["all","All types"],["SNF","Skilled Nursing (SNF)"],["HHA","Home Health (HHA)"]] },
              { label: "County",        key: "county", options: [["all","Both counties"],["Sacramento","Sacramento"],["El Dorado","El Dorado"]] },
              { label: "Sort by",       key: "sortBy", options: [["distance","Distance"],["stars","CMS stars"],["name","Name (A–Z)"],["beds","Bed count"]] },
            ].map(({ label, key, options }) => (
              <div key={key} style={{ marginBottom: 12 }}>
                <label style={{ fontSize: 10, fontWeight: 500, color: "var(--color-text-secondary)", textTransform: "uppercase", letterSpacing: "0.08em", display: "block", marginBottom: 4 }}>{label}</label>
                <select value={filters[key]} onChange={e => setF(key, e.target.value)}>
                  {options.map(([v, l]) => <option key={v} value={v}>{l}</option>)}
                </select>
              </div>
            ))}

            <div style={{ marginBottom: 12 }}>
              <label style={{ fontSize: 10, fontWeight: 500, color: "var(--color-text-secondary)", textTransform: "uppercase", letterSpacing: "0.08em", display: "block", marginBottom: 4 }}>
                Min CMS stars — <span style={{ color: "#C8920A", fontWeight: 500 }}>{filters.minStars === 0 ? "Any" : "★".repeat(filters.minStars)}</span>
              </label>
              <input type="range" min="0" max="5" step="1" value={filters.minStars} onChange={e => setF("minStars", parseInt(e.target.value))} />
            </div>

            <div style={{ marginBottom: 12 }}>
              <label style={{ fontSize: 10, fontWeight: 500, color: "var(--color-text-secondary)", textTransform: "uppercase", letterSpacing: "0.08em", display: "block", marginBottom: 4 }}>
                Max distance — <span style={{ fontWeight: 500, color: "var(--color-text-primary)" }}>{filters.maxDist} mi</span>
              </label>
              <input type="range" min="5" max="60" step="5" value={filters.maxDist} onChange={e => setF("maxDist", parseInt(e.target.value))} />
            </div>

            <div style={{ marginBottom: 4 }}>
              <label style={{ fontSize: 10, fontWeight: 500, color: "var(--color-text-secondary)", textTransform: "uppercase", letterSpacing: "0.08em", display: "block", marginBottom: 8 }}>Payer requirements</label>
              {[["medicare","Medicare only","#E6F1FB","#0C447C"],["medi_cal","Medi-Cal accepted","#E1F5EE","#0F6E56"]].map(([k, l, bg, c]) => (
                <label key={k} style={{ display: "flex", gap: 8, alignItems: "center", cursor: "pointer", marginBottom: 7, fontSize: 12, color: filters[k] ? c : "var(--color-text-secondary)" }}>
                  <input type="checkbox" checked={filters[k]} onChange={e => setF(k, e.target.checked)} style={{ accentColor: c }} />
                  <span style={{ padding: "1px 7px", borderRadius: 3, background: filters[k] ? bg : "transparent", border: `0.5px solid ${filters[k] ? c : "var(--color-border-secondary)"}`, transition: "all .15s" }}>{l}</span>
                </label>
              ))}
            </div>

            <div style={{ marginTop: 12 }}>
              <label style={{ fontSize: 10, fontWeight: 500, color: "var(--color-text-secondary)", textTransform: "uppercase", letterSpacing: "0.08em", display: "block", marginBottom: 8 }}>Managed Medi-Cal plan</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                {["Anthem","Health Net","Molina","Blue Shield"].map(plan => (
                  <span key={plan} onClick={() => setSearch(p => p === plan ? "" : plan)} style={{
                    fontSize: 10, padding: "2px 7px", borderRadius: 3, cursor: "pointer",
                    background: search === plan ? "#EEEDFE" : "var(--color-background-secondary)",
                    color:      search === plan ? "#3C3489" : "var(--color-text-secondary)",
                    border: `0.5px solid ${search === plan ? "#534AB7" : "var(--color-border-secondary)"}`,
                  }}>{plan}</span>
                ))}
              </div>
            </div>
          </div>

          {/* Legend */}
          <div style={{ background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)", padding: "10px 12px", marginTop: 10, fontSize: 11, color: "var(--color-text-secondary)", lineHeight: 1.8 }}>
            <div style={{ fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 4 }}>CMS star ratings</div>
            <div><Stars n={5} size={10} /> Excellent (5★)</div>
            <div><Stars n={4} size={10} /> Good (4★)</div>
            <div><Stars n={3} size={10} /> Average (3★)</div>
            <div><Stars n={2} size={10} /> Below avg (2★)</div>
            <div><Stars n={1} size={10} /> Much below (1★)</div>
            <div style={{ marginTop: 6, fontSize: 10 }}>Source: CMS Care Compare<br />Data refreshed monthly via CMS Provider Data Catalog</div>
          </div>
        </div>

        {/* ── Results ── */}
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontSize: 13, fontWeight: 500, color: "var(--color-text-primary)" }}>
              {results.length} facilities
              <span style={{ fontSize: 11, fontWeight: 400, color: "var(--color-text-secondary)", marginLeft: 6 }}>
                ({snfCount} SNF · {hhaCount} home health) within {filters.maxDist} mi
              </span>
            </div>
            <span style={{ fontSize: 11, color: "var(--color-text-secondary)" }}>Sorted by {filters.sortBy}</span>
          </div>

          {results.length === 0 && (
            <div style={{ textAlign: "center", padding: "40px 20px", color: "var(--color-text-secondary)" }}>
              <i className="ti ti-search" aria-hidden="true" style={{ fontSize: 28, display: "block", marginBottom: 10 }}></i>
              <div style={{ fontSize: 13, fontWeight: 500 }}>No facilities match current filters</div>
              <div style={{ fontSize: 11, marginTop: 4 }}>Try expanding the distance or reducing the star rating filter</div>
            </div>
          )}

          {results.map(f => (
            <FacilityCard key={f.id} f={f} selected={selected.some(s => s.id === f.id)} onSelect={toggleSelect} />
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PostAcuteDirectory />);
</script>
</body>
</html>
